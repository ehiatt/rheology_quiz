cite:'Hirth, G. & Tullis, J. (1992). J. Struct. Geol. 14, 145–159.',
tags:['quartz','dislocation creep regimes','BLG/SGR/GBM','recrystallization']},

{tier:2,id:'olivine-fabric-types',cat:'CPO Fabrics',
q:'Olivine develops different CPO "fabric types" (A–E). What primarily selects which fabric forms, and why does it matter seismically?',
choices:[
 'Only temperature, and it has no effect on seismic interpretation',
 'Water content and stress select the dominant slip system (e.g. A-type dry/low-stress; B-type wet/high-stress), which changes how seismic fast directions relate to flow',
 'The mineral’s colour',
 'Grain size alone, with no seismic consequence'],
ans:1,
cfb:'The active slip system — and thus fabric type — depends on water, stress, T and pressure. A-type ([100](010)) forms in dry/moderate conditions with fast [100] along flow; B-type (wet, high stress, e.g. mantle wedges) rotates the fast axis ~90°, giving trench-parallel splitting. So fabric type changes the link between measured anisotropy and flow geometry — a central caveat in interpreting shear-wave splitting.',
wfb:'Water and stress (slip-system selection), not colour, T-only, or grain-size, set the fabric type; B-type in particular can flip the fast-axis–flow relationship.',
cite:'Jung, H. & Karato, S. (2001). Science 293, 1460–1463.\nKarato, S. et al. (2008). Annu. Rev. Earth Planet. Sci. 36, 59–95.',
tags:['olivine fabric','A-type','B-type','seismic anisotropy','water']},

{tier:3,id:'rate-state-friction',cat:'Friction',
q:'Rate-and-state friction governs whether a fault slips seismically or aseismically. What is the key stability criterion?',
choices:[
 'Faults always slip seismically',
 'Velocity-WEAKENING friction (a−b < 0) permits unstable stick-slip (seismic) slip; velocity-STRENGTHENING (a−b > 0) gives stable, aseismic creep',
 'Stability depends only on the static friction coefficient',
 'Only temperature controls it'],
ans:1,
cfb:'In rate-and-state friction, steady-state friction varies with slip velocity as (a−b)·ln(V). If a−b < 0 (velocity weakening) and the loading stiffness is below a critical value, slip is unstable → earthquakes; if a−b > 0 (velocity strengthening), perturbations decay → stable sliding/creep. This Dieterich–Ruina framework underlies the seismogenic-zone concept.',
wfb:'The sign of (a−b) sets stability: weakening → seismic, strengthening → aseismic. It is not fixed by static μ or temperature alone, and not all faults are seismic.',
cite:'Dieterich, J.H. (1979). J. Geophys. Res. 84, 2161–2168.\nMarone, C. (1998). Annu. Rev. Earth Planet. Sci. 26, 643–696.',
tags:['rate-and-state friction','velocity weakening','seismic vs aseismic','a-b']},

{tier:3,id:'haskell-viscosity',cat:'Mantle Rheology',
q:'Postglacial rebound (glacial isostatic adjustment) gives our prime constraint on mantle viscosity. What value does it yield, and what is it called?',
choices:[
 '~10¹² Pa·s, the "asthenosphere value"',
 '~10²¹ Pa·s, the "Haskell value" for the upper/mid-mantle, from the decay of uplift after ice unloading (Fennoscandia, Hudson Bay)',
 '~10²⁸ Pa·s, equal to the lithosphere',
 'Viscosity cannot be constrained from rebound'],
ans:1,
cfb:'The rate of post-glacial uplift records the viscous relaxation of the mantle. Haskell’s (1935) analysis of Fennoscandian rebound gave η ≈ 10²¹ Pa·s — the "Haskell value," still the canonical average upper-mantle viscosity. The relaxation time τ ≈ 4πη/(ρgλ) ties the observed decay to viscosity.',
wfb:'Rebound yields ~10²¹ Pa·s (the Haskell value), not 10¹² or 10²⁸; it is the prime observational constraint on mantle viscosity.',
cite:'Haskell, N.A. (1935). Physics 6, 265–269.\nTurcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 6.',
tags:['Haskell value','mantle viscosity','postglacial rebound','GIA']},

{tier:4,id:'strength-envelope-peak',cat:'Strength Envelope',
q:'In a lithospheric strength envelope, where is the lithosphere strongest, and why?',
choices:[
 'At the surface, where it is coldest and most rigid',
 'At the brittle–ductile transition, where the upward-increasing frictional (Byerlee) strength meets the downward-decreasing thermally-activated creep strength — the branches cross at a peak',
 'At the base of the lithosphere',
 'Strength is uniform with depth'],
ans:1,
cfb:'Frictional strength rises with depth (∝ normal stress; Byerlee), while ductile creep strength falls with depth (T rises → exp(−Q/RT)). The envelope peaks where the two branches cross — the brittle–ductile transition (mid-crust or upper mantle, depending on geotherm and composition). This peak largely sets the integrated strength of the lithosphere.',
wfb:'The strength maximum sits at the brittle–ductile transition where the frictional and creep branches intersect — not at the surface, the base, or uniform with depth.',
cite:'Brace, W.F. & Kohlstedt, D.L. (1980). J. Geophys. Res. 85, 6248–6252.\nKohlstedt, D.L., Evans, B. & Mackwell, S.J. (1995). J. Geophys. Res. 100, 17587–17602.',
tags:['strength envelope','brittle-ductile transition','lithosphere','Byerlee']},

{tier:4,id:'griggs-vs-gas',cat:'Apparatus',
q:'Two classic apparatus for ductile rock deformation are the Griggs (solid-medium) rig and the Paterson (gas-medium) rig. What is the key trade-off?',
choices:[
 'They are essentially identical',
 'The Griggs rig reaches higher pressure (solid confining medium) but needs large friction/strength corrections; the gas-medium (Paterson) rig gives much better stress resolution but is limited to lower pressure (~0.3 GPa)',
 'The gas-medium rig reaches the higher pressure',
 'Neither can measure differential stress'],
ans:1,
cfb:'Solid-medium (Griggs) assemblies reach a few GPa, but the strong confining medium adds friction and seal strength that must be corrected, limiting stress accuracy. Gas-medium (Paterson) rigs use a gas confining pressure (~300 MPa max) with an internal load cell, giving excellent stress resolution. The choice trades pressure range against stress precision — complementary tools.',
wfb:'Griggs = high pressure but poorer stress accuracy (friction corrections); Paterson gas rig = low pressure but high stress resolution. Both measure stress; they are complementary, not identical.',
cite:'Tullis, T.E. & Tullis, J. (1986). Experimental rock deformation techniques. In: Mineral and Rock Deformation (AGU Geophys. Monogr. 36), 297–324.',
tags:['Griggs apparatus','Paterson apparatus','confining medium','stress resolution']},

// ══ BASICS — added 2026-06-27 (max-crosscheck passed: Claude+GPT+Gemini) ══
{tier:0,id:'def-stress',cat:'Basics',
q:'What is "stress" in rock mechanics?',
choices:['The total force applied to a body','Force per unit area (units of pascals, Pa)','The amount a rock has deformed','The energy stored in a deformed rock'],
ans:1,
cfb:'Stress is force per unit area — units of pascals (1 Pa = 1 N/m²); rocks are usually quoted in MPa or GPa. It is intensive (independent of sample size), unlike total force. A 100 N load on 1 mm² is a much higher stress than the same load on 1 m².',
wfb:'Stress is force divided by the area it acts on (Pa), not the total force, the deformation (that is strain), or stored energy.',
cite:'Turcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 2–3.',
tags:['stress','definition','units','pascal']},

{tier:0,id:'def-strain',cat:'Basics',
q:'What is "strain"?',
choices:['The force needed to deform a rock','The fractional change in length or shape — a dimensionless ratio','The rate at which a rock deforms','The stress at which a rock breaks'],
ans:1,
cfb:'Strain measures how much a material has deformed relative to its original size — e.g. ΔL/L for stretching, or the change in angle for shear. It is a ratio, so it is dimensionless (often given as a fraction or %). 0.01 strain = 1% length change.',
wfb:'Strain is the (dimensionless) amount of deformation, not a force, a rate, or a failure stress. Strain RATE (strain per time) is a separate quantity.',
cite:'Turcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 2–3.',
tags:['strain','definition','dimensionless','deformation']},

{tier:0,id:'def-strain-rate',cat:'Basics',
q:'What is "strain rate," and what are typical geologic values?',
choices:['Strain × time; ~1 s⁻¹','Strain per unit time (s⁻¹); geologic rates ~10⁻¹² to 10⁻¹⁵ s⁻¹','Stress per unit time; ~10⁶ s⁻¹','The same as strain, just renamed'],
ans:1,
cfb:'Strain rate ε̇ is how fast strain accumulates — strain divided by time, units s⁻¹. Geologic deformation is extraordinarily slow: typical mantle/crustal strain rates are ~10⁻¹² to 10⁻¹⁵ s⁻¹ (a strain of 1 takes thousands to millions of years). Labs run ~10⁻⁴–10⁻⁶ s⁻¹, so flow laws must extrapolate many orders of magnitude.',
wfb:'Strain rate is strain ÷ time (s⁻¹). Geologic values are tiny (~10⁻¹²–10⁻¹⁵ s⁻¹), which is exactly why lab results have to be extrapolated to nature.',
cite:'Karato, S. (2008). Deformation of Earth Materials, Ch. 1.',
tags:['strain rate','units','geologic rates','extrapolation']},

{tier:0,id:'def-deviatoric',cat:'Basics',
q:'A rock at depth feels a large confining pressure. Which part of the stress actually drives it to FLOW (change shape)?',
choices:['The mean (hydrostatic) stress — i.e. the pressure','The DIFFERENTIAL / deviatoric stress (the difference between the principal stresses)','The total stress magnitude','Only the vertical stress'],
ans:1,
cfb:'Stress splits into a mean (hydrostatic) part that changes volume and a deviatoric part that changes shape. Flow (distortion) is driven by the deviatoric — equivalently the differential stress σ₁−σ₃. Pure pressure (equal in all directions) compresses but does not drive shear/creep. This is why "stress" in flow laws means differential stress.',
wfb:'Shape change/flow is driven by the deviatoric (differential) stress, not the mean stress/pressure. Equal all-around pressure changes volume but cannot distort.',
cite:'Turcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 2.\nRanalli, G. (1995). Rheology of the Earth.',
tags:['deviatoric stress','differential stress','mean stress','pressure']},

{tier:0,id:'def-pressure-depth',cat:'Basics',
q:'Roughly how does lithostatic pressure increase with depth in the Earth?',
choices:['~0.33 GPa per km','~0.033 GPa per km (about 1 GPa every 30 km)','~3 GPa per km','Pressure is constant with depth'],
ans:1,
cfb:'Lithostatic pressure is the weight of overlying rock: P = ρgh. With ρ≈2700–3300 kg/m³ and g≈9.8 m/s², that is ~25–33 MPa per km — about 0.033 GPa/km, or ~1 GPa per 30 km. So the base of a 35 km crust is ~1 GPa; the 410 km transition zone is ~14 GPa.',
wfb:'Pressure rises ~0.033 GPa/km (≈1 GPa per 30 km), from P = ρgh — not 0.33 or 3 GPa/km, and certainly not constant.',
cite:'Turcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 2.',
tags:['lithostatic pressure','depth','rho g h','gradient']},

{tier:0,id:'def-elastic-viscous-plastic',cat:'Basics',
q:'What distinguishes ELASTIC, VISCOUS, and PLASTIC behavior?',
choices:[
 'They are three names for the same response',
 'Elastic = recoverable strain (∝ stress); viscous = flows continuously at a rate set by stress; plastic = permanent strain once a yield stress is exceeded',
 'Elastic is permanent; viscous is instantaneous; plastic is recoverable',
 'They differ only in temperature, not mechanism'],
ans:1,
cfb:'Elastic strain is recoverable and proportional to stress (spring; removed stress → strain returns). Viscous strain accumulates continuously while stress is applied, at a rate set by the stress (dashpot; not recovered). Plastic strain is permanent and only occurs once stress exceeds a yield value. Real rocks combine these (e.g. visco-elastic, elasto-plastic).',
wfb:'Elastic = recoverable (∝ stress); viscous = continuous flow at a stress-controlled rate; plastic = permanent beyond a yield stress. They are genuinely different responses, not the same thing.',
cite:'Ranalli, G. (1995). Rheology of the Earth, Ch. 2.\nTurcotte & Schubert (2002). Geodynamics.',
tags:['elastic','viscous','plastic','rheology basics']},

{tier:0,id:'def-brittle-ductile',cat:'Basics',
q:'What is the basic difference between BRITTLE and DUCTILE deformation?',
choices:[
 'Brittle is slow; ductile is fast',
 'Brittle = failure by fracture / localized cracking; ductile = distributed flow that changes shape without losing cohesion',
 'Brittle happens only in the mantle; ductile only in the crust',
 'They are the same below 100 km'],
ans:1,
cfb:'Brittle deformation localizes onto fractures and faults — the rock loses cohesion (cataclasis, faulting), favored at low T and pressure. Ductile deformation distributes strain smoothly (folding, flow) while the rock stays coherent, favored at higher T/pressure. The brittle→ductile transition with depth is a central theme of lithospheric strength.',
wfb:'Brittle = fracture/localized loss of cohesion; ductile = distributed flow keeping cohesion. It is about mechanism (fracture vs flow), not simply speed or which layer.',
cite:'Paterson, M.S. & Wong, T.-f. (2005). Experimental Rock Deformation — The Brittle Field.\nRutter, E.H. (1986). Tectonophysics 122.',
tags:['brittle','ductile','deformation style','cohesion']},

{tier:0,id:'def-viscosity',cat:'Basics',
q:'What is "viscosity," and how does it relate stress and strain rate?',
choices:[
 'The stress a material can hold before breaking',
 'A measure of resistance to flow: η = stress / strain rate (units Pa·s); for a Newtonian material η is constant',
 'The speed at which a fluid moves',
 'The elastic stiffness of a solid'],
ans:1,
cfb:'Viscosity η quantifies resistance to flow: for a viscous material, stress = η × strain rate, so η = σ/ε̇ with units Pa·s. A Newtonian fluid has constant η (stress ∝ strain rate). The mantle is often treated as a very viscous fluid (~10²¹ Pa·s) on long timescales. Rocks are usually NON-Newtonian (η depends on stress).',
wfb:'Viscosity is resistance to flow, η = σ/ε̇ (Pa·s) — not a failure strength, a flow speed, or elastic stiffness. Constant η = Newtonian.',
cite:'Turcotte, D.L. & Schubert, G. (2002). Geodynamics, Ch. 6.',
tags:['viscosity','Pa·s','Newtonian','stress over strain rate']},

{tier:0,id:'def-creep',cat:'Basics',
q:'In rock mechanics, what does "creep" mean?',
choices:[
 'Sudden brittle failure',
 'Slow, time-dependent PERMANENT deformation under a sustained stress (often below the short-term yield strength)',
 'Elastic, fully recoverable deformation',
 'The movement of a fault during an earthquake'],
ans:1,
cfb:'Creep is the slow, continuous, permanent deformation a material undergoes when held under stress over long times — even at stresses well below its instantaneous strength. It is thermally activated (faster when hot) and is the dominant way the hot deep Earth flows. Diffusion creep and dislocation creep are its two main mechanisms.',
wfb:'Creep is slow time-dependent PERMANENT flow under sustained load — not sudden fracture, not recoverable elastic strain, and not coseismic fault slip.',
cite:'Poirier, J.-P. (1985). Creep of Crystals, Ch. 1.',
tags:['creep','time-dependent','permanent','thermally activated']},

{tier:0,id:'def-flow-law',cat:'Basics',
q:'What is a "flow law" for a rock?',
choices:[
 'A rule for how fast a fault slips',
 'An equation relating strain rate to differential stress, temperature (and often grain size and water): e.g. ε̇ = A σⁿ exp(−Q/RT)',
 'The maximum stress a rock can hold',
 'A law forbidding certain deformation'],
ans:1,
cfb:'A flow law is the constitutive equation for ductile deformation — it predicts strain rate from stress and conditions: ε̇ = A σⁿ d⁻ᵐ f(H₂O)ʳ exp[−(E*+PV*)/RT]. The exponents (n, m) and activation parameters (E*, V*) encode the mechanism. Measuring these in the lab and extrapolating to geologic strain rates is the heart of experimental rock deformation.',
wfb:'A flow law links strain rate to stress, T (and grain size, water): ε̇ = A σⁿ exp(−Q/RT)… — it is not a fault-slip rule, a strength limit, or a prohibition.',
cite:'Hirth, G. & Kohlstedt, D.L. (2003). AGU Monogr. 138, 83–105.\nKarato, S. (2008). Deformation of Earth Materials.',
tags:['flow law','constitutive equation','strain rate','stress']},

{tier:0,id:'def-dislocation',cat:'Basics',
q:'What is a "dislocation" in a crystal?',
choices:[
 'A crack in the crystal',
 'A line defect — a row of misaligned atoms — whose movement lets the crystal slip and deform plastically without breaking',
 'A grain that has rotated out of place',
 'A pocket of melt between grains'],
ans:1,
cfb:'A dislocation is a one-dimensional (line) defect in the crystal lattice. Its great importance: a dislocation lets a crystal shear one atomic row at a time, so plastic slip happens at far lower stress than breaking all the bonds at once. Dislocation glide and climb are the basis of dislocation (power-law) creep.',
wfb:'A dislocation is a LINE defect (misaligned row of atoms) that carries plastic slip — not a crack, a rotated grain, or a melt pocket.',
cite:'Poirier, J.-P. (1985). Creep of Crystals, Ch. 2.',
tags:['dislocation','line defect','plastic slip','crystal']},

{tier:0,id:'def-grain-boundary',cat:'Basics',
q:'What is a "grain boundary," and why does it matter for deformation?',
choices:[
 'The outer surface of a hand sample',
 'The interface between two crystals of different orientation — a fast diffusion path that can also slide',
 'A crack that always weakens the rock',
 'The boundary between two minerals only, never between same-mineral grains'],
ans:1,
cfb:'A grain boundary is the internal interface where two crystals of differing orientation meet. It is a region of disorder that acts as a fast pathway for atomic diffusion (driving Coble creep) and can accommodate grain-boundary sliding. Finer-grained rocks have more boundary area, which is why many creep mechanisms are grain-size sensitive.',
wfb:'A grain boundary is the internal interface between mis-oriented crystals (same or different mineral) — a fast diffusion path and sliding surface, not the sample exterior or necessarily a crack.',
cite:'Poirier, J.-P. (1985). Creep of Crystals.\nKarato, S. (2008). Deformation of Earth Materials.',
tags:['grain boundary','diffusion path','grain-size sensitivity','sliding']},

{tier:0,id:'def-homologous-temp',cat:'Basics',
q:'What is "homologous temperature," and why is it used?',
choices:[
 'Temperature in Fahrenheit',
 'The ratio T/Tₘ (absolute temperature over melting temperature) — creep becomes important above roughly 0.5 Tₘ',
 'The temperature at the centre of the Earth',
 'The temperature difference between two rocks'],
ans:1,
cfb:'Homologous temperature is T/Tₘ, both in kelvin. It normalizes "how hot" a material is relative to its own melting point, because thermally-activated creep depends on this ratio rather than absolute T. Most crystalline solids creep significantly above ~0.5 Tₘ. Olivine (Tₘ≈2100 K) creeps readily at upper-mantle temperatures (~1600 K ≈ 0.75 Tₘ).',
wfb:'Homologous temperature = T/Tₘ (absolute). It matters because creep "turns on" at a roughly fixed fraction (~0.5) of the melting temperature, regardless of the actual value.',
cite:'Frost, H.J. & Ashby, M.F. (1982). Deformation-Mechanism Maps.\nPoirier (1985). Creep of Crystals.',
tags:['homologous temperature','T over Tm','thermal activation','creep onset']},

{tier:0,id:'def-stress-exponent',cat:'Basics',
q:'In a flow law ε̇ ∝ σⁿ, what does the stress exponent n tell you?',
choices:[
 'The temperature of deformation',
 'How nonlinear the rheology is: n=1 means Newtonian (strain rate ∝ stress, diffusion creep); n>1 (≈3–4) means dislocation creep, where doubling stress more than doubles strain rate',
 'The grain size',
 'The depth of deformation'],
ans:1,
cfb:'n is the power of stress in the flow law. n=1 is linear/Newtonian — characteristic of diffusion creep. n>1 (typically 3–4 for dislocation creep) is nonlinear: at n=3, doubling the stress raises strain rate 2³ = 8×. Identifying n in experiments is a primary way to diagnose which creep mechanism operates.',
wfb:'n is the stress sensitivity: n=1 Newtonian (diffusion creep), n≈3–4 dislocation creep (strongly nonlinear). It is not temperature, grain size, or depth.',
cite:'Poirier, J.-P. (1985). Creep of Crystals, Ch. 4.\nHirth & Kohlstedt (2003). AGU Monogr. 138.',
tags:['stress exponent','n','Newtonian','nonlinear']},

{tier:0,id:'def-activation-energy',cat:'Basics',
q:'Flow laws contain a factor exp(−Q/RT). What does the activation energy Q control?',
choices:[
 'The grain size dependence',
 'The TEMPERATURE sensitivity of the deformation rate — larger Q means strain rate climbs more steeply as T rises',
 'The maximum stress before failure',
 'The elastic modulus'],
ans:1,
cfb:'Q (activation energy, often E*) sets how strongly temperature speeds up a thermally-activated process via the Arrhenius factor exp(−Q/RT). A larger Q means the rate is more sensitive to T — rising fast when heated, plunging when cooled. For high-temperature creep Q is close to the activation energy for self-diffusion, a clue that diffusion controls the rate.',
wfb:'Q governs TEMPERATURE sensitivity through exp(−Q/RT) — not grain-size dependence, failure stress, or elasticity. Bigger Q = steeper rise of rate with T.',
cite:'Poirier, J.-P. (1985). Creep of Crystals.\nKarato, S. (2008). Deformation of Earth Materials.',
tags:['activation energy','Arrhenius','temperature sensitivity','exp(-Q/RT)']},

{tier:0,id:'def-rheology',cat:'Basics',
q:'What does "rheology" mean?',
choices:[
 'The study of rock ages',
 'The study of the flow and deformation of materials (how they respond to stress)',
 'The chemistry of minerals',
 'The classification of rock types'],
ans:1,
cfb:'Rheology is the science of how materials deform and flow under stress — the relationship between stress, strain, strain rate, and time. For the solid Earth it spans elastic, viscous, and plastic behavior and the creep laws that let "solid" rock flow over geologic time.',
wfb:'Rheology is the study of flow and deformation under stress — not geochronology, mineral chemistry, or rock classification.',
cite:'Ranalli, G. (1995). Rheology of the Earth.',
tags:['rheology','definition','flow','deformation']},

{tier:0,id:'def-two-creep-families',cat:'Basics',
q:'High-temperature ductile creep comes in two broad families. What are they?',
choices:[
 'Brittle creep and elastic creep',
 'DIFFUSION creep (atoms diffuse; grain-size sensitive; n=1) and DISLOCATION creep (defects glide/climb; grain-size insensitive; n>1)',
 'Fast creep and slow creep',
 'Wet creep and dry creep only'],
ans:1,
cfb:'The two end-member ductile mechanisms are diffusion creep — material transport by atomic diffusion through grains (Nabarro–Herring) or along boundaries (Coble), giving n=1 and strong grain-size sensitivity — and dislocation creep — motion of line defects, giving n≈3–4 and (to first order) no grain-size dependence. Which dominates depends on stress, grain size, and temperature (a deformation-mechanism map).',
wfb:'The two families are diffusion creep (n=1, grain-size sensitive) and dislocation creep (n>1, grain-size insensitive). "Brittle/elastic creep" and "fast/slow" are not the mechanistic split.',
cite:'Frost, H.J. & Ashby, M.F. (1982). Deformation-Mechanism Maps.\nPoirier (1985). Creep of Crystals.',
tags:['diffusion creep','dislocation creep','mechanisms','grain-size sensitivity']},

{tier:0,id:'def-steady-transient',cat:'Basics',
q:'A creep test plots strain vs time. What is the difference between TRANSIENT (primary) and STEADY-STATE (secondary) creep?',
choices:[
 'Transient is permanent; steady-state is elastic',
 'Transient creep decelerates as the material work-hardens; steady-state creep proceeds at a constant strain rate (hardening balanced by recovery)',
 'They are identical',
 'Steady-state always comes before transient'],
ans:1,
cfb:'In a constant-stress creep curve, strain first accumulates quickly then decelerates (primary/transient creep) as the material hardens. It then settles into secondary/steady-state creep — a constant strain rate where work-hardening is balanced by recovery. (A tertiary stage of acceleration to failure can follow.) Flow laws are written for the steady-state stage.',
wfb:'Transient (primary) creep decelerates due to hardening; steady-state (secondary) runs at constant rate with hardening balanced by recovery. Transient comes first, not last.',
cite:'Poirier, J.-P. (1985). Creep of Crystals, Ch. 1.',
tags:['transient creep','steady-state','primary','secondary']},

{tier:0,id:'def-shear-vs-normal',cat:'Basics',
q:'On a given plane in a stressed rock, what is the difference between the NORMAL stress and the SHEAR stress?',
choices:[
 'Normal stress is always larger',
 'Normal stress acts perpendicular to the plane; shear stress acts parallel to it — and it is the shear stress that drives sliding/slip on that plane',
 'They are the same thing measured differently',
 'Shear stress only exists in fluids'],
ans:1,
cfb:'Resolve the traction on a plane into two components: the normal stress (σₙ, perpendicular to the plane) and the shear stress (τ, parallel to it). Slip on a fault or a slip plane is driven by the shear stress; the normal stress mainly sets the frictional resistance. Schmid’s law and Mohr–Coulomb both hinge on this resolution.',
wfb:'Normal stress is perpendicular to the plane, shear stress parallel to it; shear drives slip. They are different components of the same traction, and shear stress is not exclusive to fluids.',
cite:'Jaeger, J.C., Cook, N.G.W. & Zimmerman, R.W. (2007). Fundamentals of Rock Mechanics.',
tags:['normal stress','shear stress','resolved on a plane','slip']},

{tier:0,id:'def-yield-stress',cat:'Basics',
q:'What is the "yield stress" of a material?',
choices:[
 'The stress at which it melts',
 'The stress above which deformation becomes PERMANENT (plastic) rather than fully recoverable (elastic)',
 'The stress it produces when heated',
 'The average stress in the lithosphere'],
ans:1,
cfb:'Below the yield stress a material deforms elastically and springs back when unloaded; above it, permanent (plastic) strain accumulates. For rocks the "strength" in a strength envelope is essentially the stress the material can support — set by frictional yielding in the brittle field and by creep flow stress in the ductile field.',
wfb:'Yield stress marks the onset of PERMANENT (plastic) deformation — the elastic-to-plastic threshold — not melting, a thermal output, or a lithospheric average.',
cite:'Ranalli, G. (1995). Rheology of the Earth.\nJaeger, Cook & Zimmerman (2007). Fundamentals of Rock Mechanics.',
tags:['yield stress','elastic limit','plastic','strength']},

// ══ APS SET — added 2026-06-27 (max-crosscheck passed: Claude+GPT+Gemini) ══
{tier:4,id:'aps-lattice-strain',cat:'APS Method',
q:'On the D-DIA at APS, differential stress is obtained from "lattice strain." What is actually measured?',
choices:[
 'The change in sample length from the rams',
 'The variation of a diffraction d-spacing with azimuth ψ around the Debye ring — fit and inverted through single-crystal elastic moduli to give differential stress',
 'The temperature from a thermocouple',
 'The acoustic-emission rate'],
ans:1,
cfb:'Under a non-hydrostatic stress the (hkl) d-spacing depends on the angle ψ between the diffracting plane normal and the compression axis: d(ψ) = d₀[1 + (1−3cos²ψ)·Q(hkl)]. Fitting Q(hkl) and inverting with the single-crystal elastic moduli yields the differential stress — an in-situ, sample-internal stress gauge (Singh 1998).',
wfb:'It is the azimuthal variation of a diffraction d-spacing (lattice strain), not ram displacement, temperature, or acoustic emission. The elastic theory linking d(ψ) to stress is Singh et al. (1998).',
cite:'Singh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.\nWeidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.',
tags:['lattice strain','differential stress','D-DIA','synchrotron','Singh']},

{tier:4,id:'aps-debye-ellipse',cat:'APS Method',
q:'Why does the powder diffraction (Debye) ring become elliptical under differential stress?',
choices:[
 'Because the detector is tilted',
 'Lattice planes compressed along σ₁ shrink their d-spacing (larger 2θ) while those normal to it relax — so the d-spacing, and thus 2θ, varies sinusoidally with azimuth and distorts the ring',
 'Because temperature gradients distort the beam',
 'Because the sample melts on one side'],
ans:1,
cfb:'A hydrostatic stress shifts all d-spacings equally (a concentric ring). A differential stress makes d depend on grain orientation: planes whose normals lie along the maximum compression have smaller d — hence larger 2θ, so the ring bulges OUTWARD at that azimuth — while those perpendicular have larger d (smaller 2θ, ring pulled in). The ring becomes elliptical, and the azimuthal amplitude scales with the differential stress.',
wfb:'The ellipticity is a real stress signal: d-spacing varies with azimuth because compression along σ₁ shortens those planes. It is not a detector tilt, thermal, or melting artifact.',
cite:'Singh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.',
tags:['Debye ring','azimuthal d-spacing','differential stress','diffraction']},

{tier:4,id:'aps-independent-stress',cat:'APS Method',
q:'Why is an in-situ DIFFRACTION-based stress measurement so valuable in a solid-medium press like the D-DIA?',
choices:[
 'It is cheaper than a load cell',
 'It reads the stress IN the sample directly, bypassing the large, poorly-known friction and strength corrections that plague an external load measured through a solid confining medium',
 'It also measures temperature',
 'It eliminates the need for calibration entirely'],
ans:1,
cfb:'In a solid-medium assembly, an externally measured load is corrected for the strength and friction of the gaskets and confining medium — corrections that can be large and uncertain (the classic Griggs-rig problem). Lattice-strain diffraction reads the stress carried by the sample grains themselves, giving an independent, internal stress axis (~10 MPa precision; Weidner 2010) — exactly what a piezometer calibration needs.',
wfb:'The point is accuracy, not cost: diffraction reads the sample-internal stress and sidesteps the solid-medium friction/strength corrections. It does not measure temperature or remove the need for calibration.',
cite:'Weidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.\nSingh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.',
tags:['independent stress','solid medium','friction correction','in-situ']},

{tier:4,id:'aps-stress-precision',cat:'APS Method',
q:'White-beam synchrotron stress measurement on the D-DIA reaches roughly what precision, and what mainly limits it?',
choices:[
 '~1 GPa, limited by the press tonnage',
 '~10 MPa, limited by diffraction-peak position fitting and the accuracy of the single-crystal elastic moduli used to convert lattice strain to stress',
 '~0.1 Pa, limited by photon counting',
 'There is no meaningful precision'],
ans:1,
cfb:'Precise white-beam X-ray stress measurements reach ~10 MPa (Weidner et al. 2010). The limits are how well the diffraction peak positions (hence lattice strains) are fit, and how accurately the elastic moduli that convert lattice strain to stress are known at the run P–T. This resolution is what lets the D-DIA resolve the modest differential stresses of high-temperature creep.',
wfb:'~10 MPa, set by peak-position fitting and elastic-modulus accuracy — not GPa (that is the confining pressure scale) nor sub-Pa.',
cite:'Weidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.',
tags:['stress precision','10 MPa','white beam','Weidner']},

{tier:4,id:'aps-elastic-model',cat:'APS Method',
q:'Converting lattice strain to stress requires a diffraction-elastic model. What is the key caveat?',
choices:[
 'The model is exact and assumption-free',
 'Different (hkl) reflections give different apparent stresses because grains of different orientation strain differently — you must state the elastic model (single-crystal Cᵢⱼ; Reuss/Voigt/Hill) used',
 'Only one reflection ever exists',
 'The model only matters below 1 GPa'],
ans:1,
cfb:'Each (hkl) samples grains in a particular orientation, and elastic anisotropy means they carry different lattice strains for the same macroscopic stress. The inversion therefore depends on the single-crystal elastic constants Cᵢⱼ(P,T) and the chosen averaging (Reuss/Voigt/Hill or full elasto-plastic self-consistent). Reporting stress without stating the elastic model is incomplete.',
wfb:'The conversion is model-dependent: different (hkl) give different apparent stresses via elastic anisotropy, so the Cᵢⱼ / averaging assumption must be stated. It is not assumption-free or pressure-restricted.',
cite:'Singh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.\nWeidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.',
tags:['diffraction elastic model','Cij','hkl dependence','assumption']},

{tier:4,id:'aps-ed-xrd',cat:'APS Method',
q:'Energy-dispersive X-ray diffraction (used for in-situ stress on the D-DIA) works how?',
choices:[
 'A monochromatic beam is scanned over many angles 2θ',
 'A polychromatic ("white") beam hits the sample at a FIXED 2θ, and a solid-state detector records the diffracted ENERGY spectrum — each peak gives a d-spacing via the fixed-geometry relation E·d·sinθ = constant',
 'It measures absorbed energy only, with no diffraction',
 'It requires a single crystal'],
ans:1,
cfb:'In energy-dispersive XRD a white synchrotron beam illuminates the sample at a fixed detector angle 2θ; the energy-resolving detector records the spectrum, and each diffraction peak gives a d-spacing through Ed·sinθ = constant. The fixed geometry is ideal inside a press (small, fixed access windows) and lets stress (azimuthal d) and phase be tracked in situ during deformation. Angle-dispersive XRD instead uses a monochromatic beam and an area detector.',
wfb:'Energy-dispersive = white beam, FIXED 2θ, energy-resolved spectrum (not an angle scan, not pure absorption, not single-crystal). The fixed geometry suits the confined press environment.',
cite:'Weidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.\nWang, Y. et al. (2003). Rev. Sci. Instrum. 74, 3002.',
tags:['energy-dispersive XRD','white beam','fixed 2theta','beamline']},

{tier:4,id:'aps-marker-strain',cat:'APS Method',
q:'How is the SAMPLE strain (the strain axis, independent of stress) obtained during a D-DIA run at APS?',
choices:[
 'From the ram displacement alone',
 'By X-ray radiography of dense marker foils (e.g. Ni) at the sample ends — tracking their separation directly measures sample length change, free of assembly shortening',
 'From the diffraction peak widths',
 'It cannot be measured in situ'],
ans:1,
cfb:'X-ray radiographs image opaque Ni marker foils placed at the sample ends; their changing separation gives the true sample length change versus time, and thus strain and strain rate. This beats ram/piston displacement, which also includes elastic and plastic shortening of the gaskets, pistons, and confining medium. So the D-DIA gives an independent STRESS axis (diffraction) and STRAIN axis (radiography) simultaneously.',
wfb:'Strain comes from radiography of Ni marker foils, not ram displacement (which is contaminated by assembly shortening) or peak widths. Stress (diffraction) and strain (imaging) are measured independently and in situ.',
cite:'Wang, Y. et al. (2003). Rev. Sci. Instrum. 74, 3002.',
tags:['marker foils','radiography','strain','Ni','in-situ']},

{tier:4,id:'aps-ddia-decouple',cat:'APS Method',
q:'The defining feature of the D-DIA (vs a standard cubic-anvil press) is that it can…',
choices:[
 'Reach higher pressure than any other apparatus',
 'Apply a controlled DIFFERENTIAL strain via two extra independent rams (advancing the top and bottom anvils) WHILE holding the confining pressure roughly fixed — decoupling deviatoric deformation from pressure',
 'Only compress hydrostatically',
 'Operate without X-rays'],
ans:1,
cfb:'A cubic-anvil (DIA) press loads all six anvils together — essentially hydrostatic. Wang et al. (2003) added two independent differential rams that advance the top and bottom anvils relative to the others, imposing a deviatoric strain at a chosen rate while the confining pressure stays near-constant. That decoupling of differential stress from pressure — at high P and with synchrotron access — is what makes controlled deformation experiments possible to ~15 GPa.',
wfb:'The D-DIA innovation is independent differential rams that impose deviatoric strain at fixed confining pressure — not record-high pressure, not hydrostatic-only, and it is built FOR synchrotron X-ray access.',
cite:'Wang, Y. et al. (2003). Rev. Sci. Instrum. 74, 3002.',
tags:['D-DIA','differential rams','decouple stress and pressure','deformation']},

{tier:4,id:'aps-beamline-insitu',cat:'APS Method',
q:'What makes a synchrotron beamline (e.g. APS 6-BM) so powerful for deformation experiments?',
choices:[
 'It removes the need for a press',
 'The intense, penetrating X-rays let you measure stress (diffraction) AND strain (radiography) IN SITU and simultaneously, on the sample, throughout the deformation',
 'It only works on quenched samples afterward',
 'It measures composition, not deformation'],
ans:1,
cfb:'Brilliant, high-energy synchrotron X-rays penetrate the anvils and assembly, so during the run you continuously record diffraction (lattice-strain stress, phase, texture) and radiographs (marker-foil strain) on the deforming sample. This turns the press into a real-time rheometer at mantle P–T — impossible with a lab X-ray source. The alternative, quench-and-examine, loses the in-situ stress–strain path.',
wfb:'The value is real-time, in-situ stress + strain on the sample during deformation — not eliminating the press, not post-quench only, and not a compositional tool.',
cite:'Wang, Y. et al. (2003). Rev. Sci. Instrum. 74, 3002.\nWeidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.',
tags:['synchrotron','beamline','in-situ','stress and strain']},

{tier:3,id:'aps-goddard-form',cat:'Piezometry',
q:'The subgrain-size piezometer is written in normalized form λ/b = A·(σ/μ)⁻ᵐ. Why normalize λ by b and σ by μ?',
sub:'λ = subgrain size, b = Burgers vector, μ = shear modulus.',
choices:[
 'To make the units look nicer only',
 'Normalizing collapses different minerals and P–T conditions onto a near-universal relation: σ/μ scales the stress to the material’s stiffness, and λ/b scales the subgrain size to the lattice — so the same A, m apply broadly',
 'Because λ and σ cannot be measured directly',
 'To convert stress into temperature'],
ans:1,
cfb:'Dislocation/subgrain microstructures are set by the internal-stress balance, which scales with the elastic stiffness. Dividing σ by the shear modulus μ and λ by the Burgers vector b removes most of the material- and P–T-specific elasticity, so a single normalized relation λ/b = A(σ/μ)⁻ᵐ holds across minerals and conditions (Goddard et al. 2020). The calibration question is whether A, m (and μ(P,T)) hold at lower-mantle pressure.',
wfb:'Normalization by b and μ collapses different minerals/conditions onto one relation (the physics scales with elastic stiffness) — it is not cosmetic, not because the quantities are unmeasurable, and has nothing to do with temperature conversion.',
cite:'Goddard, R.M. et al. (2020). Geophys. Res. Lett. 47, e2020GL090056.\nFrost, H.J. & Ashby, M.F. (1982). Deformation-Mechanism Maps.',
tags:['subgrain piezometer','normalization','lambda/b','sigma/mu','Goddard']},

{tier:3,id:'aps-mu-pt',cat:'Piezometry',
q:'Applying λ/b = A·(σ/μ)⁻ᵐ at depth requires the shear modulus μ at the run conditions. Why is that a real concern?',
choices:[
 'μ is a universal constant',
 'μ depends on P, T and composition (e.g. ~106 GPa for periclase at 1523 K), and an error in μ propagates straight into the inferred stress — so μ(P,T) uncertainty is part of the piezometer error budget',
 'μ only matters for elastic problems, never for creep',
 'μ can be ignored because it cancels'],
ans:1,
cfb:'Because stress enters as σ/μ, you must evaluate μ at the actual P, T and composition. For periclase, μ ≈ 106 GPa at 1523 K (Fan et al. 2019); it rises with pressure and falls with temperature, and Fe content shifts it. Any error in μ(P,T) maps directly onto the back-calculated stress, so propagating the modulus uncertainty is essential — and is one reason the calibration uses an independent in-situ stress axis.',
wfb:'μ is not constant and does not cancel: it varies with P, T, composition, and its uncertainty propagates into the inferred stress. It is central, not ignorable, for a σ/μ-based piezometer.',
cite:'Goddard, R.M. et al. (2020). Geophys. Res. Lett. 47, e2020GL090056.\nFan, D. et al. (2019).',
tags:['shear modulus','mu(P,T)','error budget','periclase']},

{tier:3,id:'aps-highp-gap',cat:'Piezometry',
q:'Subgrain piezometers are calibrated in olivine/quartz at modest pressure, then applied to the deep mantle. What is the scientific gap an in-situ high-P calibration addresses?',
choices:[
 'Whether stress exists in the mantle at all',
 'Whether the calibration constants (A, m) and the σ/μ normalization that hold at low pressure still hold at lower-mantle pressure — testable only by calibrating in situ at high P with an INDEPENDENT stress axis',
 'Whether subgrains form at all',
 'Whether X-rays penetrate rock'],
ans:1,
cfb:'A piezometer extrapolated far outside its calibration range is a leap of faith. Calibrating ferropericlase in situ on the D-DIA — measuring subgrain size and the differential stress independently (lattice strain) at high P and T — tests whether A, m and the μ(P,T) normalization transfer to lower-mantle conditions. That is the contribution: closing the low-P-calibration-to-deep-Earth-application gap.',
wfb:'The gap is whether the low-P calibration (A, m, σ/μ) transfers to high pressure — answered by an in-situ, independent-stress high-P calibration. The other options are not in doubt.',
cite:'Goddard, R.M. et al. (2020). Geophys. Res. Lett. 47, e2020GL090056.\nWiesman, H.S. et al. (2023). J. Geophys. Res. Solid Earth 128, e2022JB025723.',
tags:['calibration gap','high pressure','extrapolation','independent stress']},

{tier:3,id:'aps-dual-sensor',cat:'Piezometry',
q:'A calibration run carries TWO stress sensors — polycrystalline MgO and pyrope garnet — measured together. Why two, with different crystals?',
choices:[
 'Redundancy in case one breaks',
 'They have different single-crystal elastic moduli (Cᵢⱼ), so comparing the stress each reports detects and bounds CORRELATED modulus systematics in the lattice-strain method — an error more runs of one sensor cannot reveal',
 'One measures stress, the other temperature',
 'Pyrope is only there for pressure'],
ans:1,
cfb:'Because lattice-strain stress depends on the elastic model, a systematic error in the assumed Cᵢⱼ biases every measurement the same way — invisible to repetition. Two sensors with independent elastic constants (MgO vs pyrope) should report the same applied stress; a divergence flags (and bounds) such correlated modulus systematics. It is a cross-check on accuracy, not just precision.',
wfb:'The two sensors have different Cᵢⱼ, so they expose correlated elastic-model (modulus) systematics that adding runs of one sensor cannot. It is not mere redundancy, a thermometer, or pressure-only.',
cite:'Singh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.',
tags:['dual sensor','MgO','pyrope','modulus systematics','accuracy']},

{tier:3,id:'aps-fe-effect',cat:'Ferropericlase',
q:'The calibration deliberately includes BOTH MgO end-member and Fe-bearing (Mg₀.₉,Fe₀.₁)O. Why add iron?',
choices:[
 'Iron makes EBSD easier',
 'Real lower-mantle ferropericlase is Fe-bearing; Fe changes the defect chemistry and rheology, so a piezometer meant for the mantle must be tested for composition dependence, not just on pure MgO',
 'Iron raises the melting point so runs are safer',
 'Iron has no effect; it is cosmetic'],
ans:1,
cfb:'Lower-mantle ferropericlase contains ~10–20% Fe. Iron alters point-defect concentrations and can change creep strength and the subgrain–stress relation, so a calibration done only on pure periclase (as in the Wiesman application) may not transfer. Including (Mg₀.₉,Fe₀.₁)O as a labeled extension tests whether the piezometer is composition-robust for the actual mantle phase.',
wfb:'Fe is added because mantle ferropericlase is Fe-bearing and iron affects defect chemistry/rheology — the calibration must probe composition dependence. It is not about EBSD ease, melting, or cosmetics.',
cite:'Wiesman, H.S. et al. (2023). J. Geophys. Res. Solid Earth 128, e2022JB025723.\nIta, J. & Cohen, R.E. (1998). Geophys. Res. Lett. 25, 1095.',
tags:['ferropericlase','iron','composition dependence','(Mg,Fe)O']},

{tier:2,id:'aps-fp-weak',cat:'Ferropericlase',
q:'Why does ferropericlase rheology matter so much for the lower mantle, despite bridgmanite being more abundant?',
choices:[
 'Ferropericlase is the strongest mantle phase',
 'Ferropericlase is ~16–20 vol% of the lower mantle AND rheologically weak, so if it interconnects it can control the bulk (composite) strength — the weak phase governs flow',
 'It only exists in the crust',
 'It has no effect on deformation'],
ans:1,
cfb:'Bridgmanite dominates by volume but is strong; ferropericlase is a substantial minority (~16–20 vol%) and much weaker. As with any strong+weak mixture, once the weak phase forms an interconnected network strain localizes into it and the aggregate weakens toward the weak-phase rheology. So ferropericlase can punch above its volume fraction in setting lower-mantle viscosity — which is why its flow law (and a piezometer for it) is worth pinning down.',
wfb:'Ferropericlase is weak and abundant enough (~16–20 vol%) that, if interconnected, it controls composite flow — not the strongest phase, not crustal, not negligible.',
cite:'Ita, J. & Cohen, R.E. (1998). Geophys. Res. Lett. 25, 1095.\nGirard, J. et al. (2016). Science 351, 144–147.',
tags:['ferropericlase','lower mantle','weak phase','composite strength']},

{tier:3,id:'aps-wiesman-breakdown',cat:'Ferropericlase',
q:'Wiesman et al. (2023) applied the subgrain piezometer to periclase in two-phase samples. Where did the piezometry BREAK DOWN?',
choices:[
 'At very low strain only',
 'In well-mixed, fine-grained (ultramylonite-like) two-phase samples, where Zener pinning holds the grain size BELOW the equilibrium subgrain size — so subgrains never fully develop and the single-phase relation fails',
 'It never breaks down',
 'Only above 100 GPa'],
ans:1,
cfb:'In coarser or single-phase material, periclase subgrain sizes fell within error of the single-phase piezometer. But in strongly mixed, fine-grained two-phase aggregates, phase-boundary (Zener) pinning held grains smaller than the subgrain size the stress would otherwise set — the subgrains can’t develop, so the piezometer reads wrong. Identifying that breakdown regime is the sharpest motivation for a proper high-P, controlled calibration.',
wfb:'It breaks down where second-phase (Zener) pinning forces grain size below the subgrain size in well-mixed fine-grained samples — not at low strain only, and it is a real, identified limit (not pressure-extreme).',
cite:'Wiesman, H.S. et al. (2023). J. Geophys. Res. Solid Earth 128, e2022JB025723.',
tags:['Wiesman 2023','Zener pinning','piezometer breakdown','two-phase']},

{tier:2,id:'aps-mgo-slip',cat:'Ferropericlase',
q:'How does MgO/periclase accommodate dislocation creep, and why does pressure matter?',
choices:[
 'By melting at grain boundaries',
 'By slip on {110}⟨1̄10⟩ at low pressure, with a pressure-induced change in the relative ease of slip systems (e.g. activation of {100} slip deeper) — important for predicting lower-mantle fabric and strength',
 'It cannot deform plastically',
 'Only by brittle fracture at all depths'],
ans:1,
cfb:'Periclase deforms plastically by dislocation glide/climb, with {110}⟨1̄10⟩ the easy slip system at low pressure. Increasing pressure changes the relative critical resolved shear stresses of the slip systems (the {110} vs {100} competition), shifting the dominant slip and thus the developing CPO and strength in the deep mantle — and fine grain sizes can bring in grain-boundary sliding (Ledoux et al. 2022).',
wfb:'MgO creeps by dislocation slip ({110}⟨1̄10⟩ at low P), with a pressure-induced slip-system change — not by melting or pure fracture, and it certainly does deform plastically.',
cite:'Ledoux, E. et al. (2022). Front. Earth Sci. 10, 849777.',
tags:['MgO','slip systems','{110}','pressure','Ledoux']},

{tier:2,id:'aps-mgo-dislocation',cat:'Ferropericlase',
q:'What is the microstructural basis that lets a SUBGRAIN piezometer work in MgO?',
choices:[
 'MgO has no dislocations',
 'During high-T creep, dislocations organize by recovery into low-angle walls (subgrain boundaries / networks) whose spacing reflects the dislocation density and hence the stress',
 'Subgrains form only on cooling, unrelated to stress',
 'The grains are always single crystals'],
ans:1,
cfb:'Creep-deformed MgO develops well-organized dislocation networks and low-angle subgrain walls through dynamic recovery (Bilde-Sørensen 1972; Hüther & Reppich lineage). Because the wall spacing tracks the steady-state dislocation density — itself set by the flow stress (ρ ∝ σ²) — the subgrain size scales as σ⁻¹. That recovery-organized substructure is precisely what the piezometer reads.',
wfb:'Subgrains are recovery-organized dislocation walls whose spacing reflects the stress-controlled dislocation density (∝ σ⁻¹) — MgO does have dislocations, and the substructure is a deformation feature, not a cooling artifact.',
cite:'Bilde-Sørensen, J.B. (1972). J. Am. Ceram. Soc. 55, 606.\nTakeuchi, S. & Argon, A.S. (1976). J. Mater. Sci. 11, 1542.',
tags:['MgO','subgrain walls','dynamic recovery','dislocation network']},

{tier:2,id:'aps-takeuchi-theory',cat:'Piezometry',
q:'What is the theoretical basis for "subgrain size ∝ σ⁻¹" that underpins the piezometer?',
choices:[
 'An empirical fit with no physics',
 'Steady-state creep theory (Takeuchi & Argon 1976): the subgrain (dislocation-wall) spacing is set by the internal-stress balance, which scales inversely with the applied stress — so λ ∝ μb/σ',
 'Subgrain size depends only on temperature',
 'Subgrain size is set by the grain size'],
ans:1,
cfb:'Takeuchi & Argon (1976) framed steady-state creep substructure: the spacing of dislocation walls is governed by the balance between the applied stress and the internal stress of the dislocation network (σ ≈ αμb√ρ, walls ~ ρ⁻¹/²), giving subgrain size λ ∝ μb/σ. That σ⁻¹ scaling — not a blind fit — is the physical justification for using subgrain size as a stress gauge.',
wfb:'The σ⁻¹ scaling comes from steady-state creep theory (internal-stress balance, λ ∝ μb/σ; Takeuchi & Argon 1976) — it is physically grounded, and depends on stress, not temperature or grain size, to first order.',
cite:'Takeuchi, S. & Argon, A.S. (1976). J. Mater. Sci. 11, 1542.',
tags:['Takeuchi-Argon','subgrain scaling','internal stress','theory']},

{tier:3,id:'aps-girard-twophase',cat:'Deep Earth',
q:'Girard et al. (2016) deformed bridgmanite + ferropericlase aggregates at lower-mantle conditions. What did they find about strain partitioning?',
choices:[
 'Both phases deform equally',
 'Strain partitions strongly into the weak ferropericlase, so the bulk rheology is NOT the average of the two phases — the weak interconnected phase dominates the aggregate flow',
 'Bridgmanite carries all the strain',
 'The aggregate is rigid'],
ans:1,
cfb:'Girard et al. (2016, Science) showed that in bridgmanite + ferropericlase aggregates the weak ferropericlase takes up most of the strain, so the composite is weaker than a volume average and its flow is governed by the interconnected weak phase. This is the deformation-side reason ferropericlase rheology — and a reliable stress gauge for it — matters for lower-mantle dynamics.',
wfb:'Strain localizes into the weak ferropericlase; the composite is not a simple average and is not rigid, and bridgmanite does not carry all the strain.',
cite:'Girard, J. et al. (2016). Science 351, 144–147.',
tags:['Girard 2016','bridgmanite','ferropericlase','strain partitioning','lower mantle']}
];

const TIER_LABELS=['Foundational','Mechanistic','Advanced','Attribution','Depth & Apparatus'];
const TIER_FILTERS=['All',...TIER_LABELS];
const CATS=['All',...[...new Set(Q.map(q=>q.cat))].sort()];
const DAILY_N=10,RANDOM_N=12,MASTER_N=5;

/* Learn-mode syllabus: ordered concept clusters, basics -> advanced. Each question id appears once. */
const SYLLABUS=[
 {name:'Stress, strain & pressure',ids:['def-stress','def-strain','def-strain-rate','def-shear-vs-normal','def-deviatoric','def-pressure-depth','stress-tensor-decomp']},
 {name:'How rock deforms (elastic / viscous / plastic)',ids:['def-elastic-viscous-plastic','def-brittle-ductile','def-viscosity','def-creep','def-yield-stress','def-rheology']},
 {name:'Flow laws & the creep families',ids:['def-flow-law','def-stress-exponent','def-activation-energy','def-homologous-temp','def-two-creep-families','def-steady-transient']},
 {name:'Diffusion creep',ids:['def-grain-boundary','nh-grain','coble-grain','diff-newtonian','coble-low-T','gss-gsi']},
 {name:'Dislocations & slip',ids:['def-dislocation','edge-vs-screw','miller-indices','crss','schmid-law','orowan-eq','frank-read']},
 {name:'Dislocation creep',ids:['climb-mechanism','climb-controlled','n3-double','weertman-deriv','rho-sigma-squared','rate-limiting-si']},
 {name:'Grain-size sensitivity, GBS & two-phase',ids:['disgbs','second-phase-weakening','wiesman-twophase','phase-mixing-drop','melt-contiguity','composite-crossover']},
 {name:'Water & olivine rheology',ids:['wet-dry','water-weakening','olivine-slip-systems','olivine-structure','bai-n35','karato-wu-synthesis']},
 {name:'Microstructure & paleopiezometry',ids:['piezometer-concept','recryst-piezometer','subgrain-piezometer','subgrain-vs-recryst','recryst-regimes','quartz-regimes']},
 {name:'CPO & seismic anisotropy',ids:['cpo-atype','cpo-anisotropy','olivine-fabric-types']},
 {name:'Viscoelasticity, low-T plasticity & deformation maps',ids:['maxwell-time','ashby-axes','low-t-plasticity-law','peierls-conditions']},
 {name:'Brittle deformation & friction',ids:['byerlee-law','mohr-coulomb','rate-state-friction','goetze-criterion','strength-envelope-peak','shear-heating']},
 {name:'Mantle rheology, viscosity & depth',ids:['haskell-viscosity','activation-volume','depth-410','depth-660','depth-lower-mantle']},
 {name:'Apparatus & methods',ids:['ddia-synchrotron','depth-ddia','depth-rda','depth-griggs','depth-lvt','lvt-vs-axial','griggs-vs-gas']},
 {name:'Who established what',ids:['who-nabarro','who-weertman','who-durham','who-hk','who-wang','who-yamazaki','who-ito89','who-bercovici','who-poirier']},
 {name:'APS synchrotron deformation (D-DIA)',ids:['aps-ddia-decouple','aps-beamline-insitu','aps-lattice-strain','aps-debye-ellipse','aps-ed-xrd','aps-marker-strain','aps-independent-stress','aps-stress-precision','aps-elastic-model']},
 {name:'Subgrain piezometry & ferropericlase',ids:['aps-takeuchi-theory','aps-goddard-form','aps-mu-pt','aps-highp-gap','aps-dual-sensor','aps-fp-weak','aps-fe-effect','aps-mgo-slip','aps-mgo-dislocation','aps-wiesman-breakdown','aps-girard-twophase']}
];

/* ---- persistent progress (localStorage) ---- */
const SKEY='rq_progress_v1';
function blankStats(){return{lifetime:{answered:0,correct:0},perQ:{},daily:{last:null,streak:0,best:0},skipped:{},learn:{concept:0,streak:0,mastered:{}}};}
function loadStats(){try{const s=JSON.parse(localStorage.getItem(SKEY));if(s){if(!s.learn)s.learn={concept:0,streak:0,mastered:{}};if(!s.skipped)s.skipped={};}return s||blankStats();}catch(e){return blankStats();}}
function saveStats(){try{localStorage.setItem(SKEY,JSON.stringify(stats));}catch(e){}}
let stats=loadStats();
function missedIds(){return Q.filter(q=>stats.perQ[q.id]&&stats.perQ[q.id].missed);}
function qById(id){return Q.find(q=>q.id===id)||null;}

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysBetween(a,b){return Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/86400000);}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function seededPick(arr,n,seed){let s=2166136261;for(let k=0;k<seed.length;k++)s=(s^seed.charCodeAt(k))*16777619>>>0;const a=[...arr];for(let i=a.length-1;i>0;i--){s=(s*1103515245+12345)>>>0;const j=s%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a.slice(0,Math.min(n,a.length));}

let state={mode:'practice',tier:'All',cat:'All',queue:[],qIdx:0,answered:false,selected:null,score:0,total:0,history:[],showResults:false,order:[],lastLearnId:null,justMastered:null,learnDone:false,showWeakness:false};

/* shuffle the displayed answer order (subtle variation; no position-memorizing) */
function focusQ(){const q=curQ();state.order=q?shuffle(q.choices.map((_,i)=>i)):[];}

function poolFor(){
  if(state.mode==='daily')return seededPick(Q,DAILY_N,todayStr());
  if(state.mode==='random')return shuffle(Q).slice(0,RANDOM_N);
  if(state.mode==='review')return shuffle(missedIds());
  let pool=Q.filter(q=>(state.tier==='All'||TIER_LABELS[q.tier]===state.tier)&&(state.cat==='All'||q.cat===state.cat));
  return shuffle(pool);
}
function buildQueue(){
  if(state.mode==='learn'){serveLearnQ();return;}
  state.queue=poolFor();state.qIdx=0;state.answered=false;state.selected=null;state.score=0;state.total=0;state.history=[];state.showResults=false;focusQ();
}
function curQ(){return state.queue[state.qIdx]||null;}

/* ---- Learn mode: walk the syllabus; 5 correct in a row masters a concept; a wrong answer resets it ---- */
function learnConceptQ(){const c=SYLLABUS[stats.learn.concept];if(!c)return null;const pool=c.ids.map(qById).filter(Boolean);let pick=pool.filter(q=>q.id!==state.lastLearnId);if(!pick.length)pick=pool;return pick.length?pick[Math.floor(Math.random()*pick.length)]:null;}
function serveLearnQ(){state.justMastered=null;state.showWeakness=false;if(stats.learn.concept>=SYLLABUS.length){state.learnDone=true;state.queue=[];return;}state.learnDone=false;const q=learnConceptQ();state.queue=q?[q]:[];state.qIdx=0;state.answered=false;state.selected=null;state.lastLearnId=q?q.id:null;focusQ();}
function learnAdvance(){const L=stats.learn;if(L.streak>=MASTER_N){L.mastered[L.concept]=true;L.streak=0;state.justMastered=SYLLABUS[L.concept].name;L.concept++;state.learnDone=(L.concept>=SYLLABUS.length);saveStats();render();return;}serveLearnQ();render();}
function learnContinue(){serveLearnQ();render();}
function learnReset(){stats.learn={concept:0,streak:0,mastered:{}};saveStats();serveLearnQ();render();}

function selectAnswer(disp){
  if(state.answered)return;
  const q=curQ();if(!q)return;
  const orig=state.order[disp];
  state.selected=orig;state.answered=true;
  const correct=(orig===q.ans);
  state.history.push(correct?'hit':'miss');
  if(correct)state.score++;state.total++;
  const pq=stats.perQ[q.id]||(stats.perQ[q.id]={seen:0,correct:0,missed:false});
  pq.seen++;if(correct){pq.correct++;pq.missed=false;}else{pq.missed=true;}
  stats.lifetime.answered++;if(correct)stats.lifetime.correct++;
  if(state.mode==='learn')stats.learn.streak=correct?stats.learn.streak+1:0;
  saveStats();render();
}

function next(){
  if(state.mode==='learn'){learnAdvance();return;}
  state.qIdx++;state.answered=false;state.selected=null;
  if(state.qIdx>=state.queue.length){finishSession();state.showResults=true;}else{focusQ();}
  render();
}
function finishSession(){
  if(state.mode==='daily'&&state.total>0){
    const t=todayStr();
    if(stats.daily.last!==t){
      if(stats.daily.last&&daysBetween(stats.daily.last,t)===1)stats.daily.streak++;else stats.daily.streak=1;
      stats.daily.last=t;
      if(stats.daily.streak>stats.daily.best)stats.daily.best=stats.daily.streak;
      saveStats();
    }
  }
}

function skip(){
  if(state.answered)return;
  const q=state.queue[state.qIdx];if(!q)return;
  if(!stats.skipped)stats.skipped={};stats.skipped[q.id]=true;saveStats();
  state.queue.splice(state.qIdx,1);state.queue.push(q);   /* send to the back of the queue */
  state.answered=false;state.selected=null;
  if(state.qIdx>=state.queue.length)state.qIdx=0;
  focusQ();render();
}
function restart(){buildQueue();render();}
function setMode(m){state.mode=m;state.showWeakness=false;state.showResults=false;buildQueue();render();}
function setTier(f){state.tier=f;state.mode='practice';buildQueue();render();}
function setCat(c){state.cat=c;state.mode='practice';buildQueue();render();}
function grade(p){return p>=90?'Excellent':p>=75?'Good':p>=60?'Getting there':'Keep drilling';}
function resetProgress(){if(confirm('Reset all saved progress, missed list, learn ladder, and streak?')){stats=blankStats();saveStats();buildQueue();render();}}
function scopeLabel(){return state.mode==='practice'?(state.cat!=='All'?state.cat:state.tier):state.mode.charAt(0).toUpperCase()+state.mode.slice(1);}
function toggleWeakness(){state.showWeakness=!state.showWeakness;render();}
function weaknessData(){return SYLLABUS.map((c,i)=>{let seen=0,correct=0;c.ids.forEach(id=>{const p=stats.perQ[id];if(p){seen+=p.seen;correct+=p.correct;}});return{name:c.name,i,seen,correct,acc:seen?Math.round(correct/seen*100):null,mastered:!!stats.learn.mastered[i]};});}

/* ---- "Go deeper" hand-off, incognito-friendly: copy prompt + open a blank Claude chat ---- */
function rqToast(msg){let t=document.getElementById('rq-toast');if(!t){t=document.createElement('div');t.id='rq-toast';t.style.cssText='position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:var(--bg3);color:var(--txt);padding:10px 14px;border-radius:10px;font-size:12px;max-width:90%;text-align:center;z-index:99;box-shadow:0 6px 20px rgba(0,0,0,.35);transition:opacity .4s;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(window.__rqtt);window.__rqtt=setTimeout(()=>{t.style.opacity='0';},5000);}
function deepDive(text){try{if(navigator.clipboard)navigator.clipboard.writeText(text);}catch(e){}rqToast('📋 Prompt copied — turn on incognito (ghost icon, top-right of Claude), then paste');window.open('https://claude.ai/new','_blank');}
function deeperQ(){const q=curQ();if(!q)return;deepDive('Help me go deeper on a rock-rheology concept ('+q.tags[0]+'). The quiz asked: "'+q.q+'" Explain the underlying idea simply, then build my intuition with a concrete example and a common misconception to avoid.');}
function deeperResults(pct){deepDive('I just finished a rock-mechanics & rheology quiz ('+scopeLabel()+', '+pct+'%). Give me a focused ~3-minute review of the concepts I most need to reinforce, starting from the basics and building up.');}

function controlsHTML(){
  const lifeAcc=stats.lifetime.answered?Math.round(stats.lifetime.correct/stats.lifetime.answered*100):0;
  const mc=missedIds().length;
  const modes=[['learn','Learn'],['practice','Practice'],['daily','Daily'],['review','Review'+(mc?' ('+mc+')':'')],['random','Random']];
  const modeRow=`<div class="filter-scroll">${modes.map(([m,l])=>`<button class="filter-btn${state.mode===m?' active':''}" onclick="setMode('${m}')">${l}</button>`).join('')}</div>`;
  let sub='';
  if(state.mode==='practice'){
    sub=`<div class="filter-scroll">${TIER_FILTERS.map(f=>`<button class="filter-btn${state.tier===f?' active':''}" onclick="setTier('${f}')">${f}</button>`).join('')}</div>`+
    `<div class="filter-scroll"><select onchange="setCat(this.value)" style="background:var(--bg3);color:var(--txt);border:1px solid var(--bg3);border-radius:14px;padding:5px 10px;font-size:12px;max-width:100%;">${CATS.map(c=>`<option ${state.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>`;
  }else if(state.mode==='daily'){
    sub=`<div class="prog-label" style="padding:2px 2px 4px;">🔥 ${stats.daily.streak}-day streak${stats.daily.best>stats.daily.streak?' · best '+stats.daily.best:''} · today’s ${DAILY_N} questions${stats.daily.last===todayStr()?' ✓ done':''}</div>`;
  }
  const pill=`<span class="score-pill" title="lifetime accuracy / day streak">${lifeAcc}% · 🔥${stats.daily.streak}</span>`;
  return`<div class="top-row"><span class="app-label">Rheology quiz</span>${pill}</div>${modeRow}${sub}`;
}

function renderResults(){
  const pct=state.total?Math.round(state.score/state.total*100):0;
  const circ=2*Math.PI*38,dash=circ*(pct/100);
  const mc=missedIds().length;
  const lifeAcc=stats.lifetime.answered?Math.round(stats.lifetime.correct/stats.lifetime.answered*100):0;
  document.getElementById('app').innerHTML=`<div class="results">
    <div class="results-ring"><svg viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="38" fill="none" stroke="var(--bg3)" stroke-width="8"/>
      <circle cx="55" cy="55" r="38" fill="none" stroke="var(--correct-border)" stroke-width="8"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 55 55)"/>
    </svg><div class="results-pct">${pct}%</div></div>
    <div class="results-grade">${grade(pct)}</div>
    <div class="results-label">${state.score}/${state.total} · ${scopeLabel()}${state.mode==='daily'?' · 🔥'+stats.daily.streak+'-day streak':''}</div>
    <div class="results-stats">
      <div class="rstat"><div class="rstat-val">${state.total}</div><div class="rstat-lbl">questions</div></div>
      <div class="rstat"><div class="rstat-val">${state.score}</div><div class="rstat-lbl">correct</div></div>
      <div class="rstat"><div class="rstat-val">${lifeAcc}%</div><div class="rstat-lbl">lifetime</div></div>
    </div>
    <div class="streak-bar">${state.history.map(h=>`<div class="streak-dot ${h}"></div>`).join('')}</div>
    <div class="results-btns">
      <button class="btn primary" onclick="restart()">Try again (reshuffled)</button>
      ${mc?`<button class="btn info" onclick="setMode('review')">Drill ${mc} missed →</button>`:''}
      <button class="btn info" onclick="deeperResults(${pct})">↗ Get a focused review (incognito)</button>
      <button class="btn info" onclick="toggleWeakness()">📊 Weak spots</button>
    </div>
    <div style="text-align:center;margin-top:12px;"><a href="#" onclick="resetProgress();return false;" style="color:var(--muted,#8aa);font-size:11px;text-decoration:underline;">reset progress</a></div></div>`;
}

function choicesBlock(q){
  return state.order.map((orig,disp)=>{
    const c=q.choices[orig];let cls='choice';
    if(state.answered){if(orig===q.ans)cls+=' correct';else if(orig===state.selected&&orig!==q.ans)cls+=' wrong';else cls+=' dimmed';}
    return`<button class="${cls}" onclick="selectAnswer(${disp})"${state.answered?' disabled':''}>${c}</button>`;
  }).join('');
}
function feedbackBlock(q){
  if(!state.answered)return'';
  const ok=state.selected===q.ans;
  return`<div class="feedback ${ok?'correct':'wrong'}"><div class="fb-head ${ok?'c':'w'}">${ok?'✓ Correct':'✗ Not quite'}</div><div class="fb-txt">${ok?q.cfb:q.wfb}</div><div class="citation">${q.cite}</div></div>`;
}
function weaknessHTML(){
  const data=weaknessData().slice().sort((a,b)=>{if(a.acc===null)return 1;if(b.acc===null)return -1;return a.acc-b.acc;});
  const rows=data.map(d=>{
    const acc=d.acc===null?'—':d.acc+'%';const w=d.acc===null?0:d.acc;
    const col=d.acc===null?'var(--bg3)':(d.acc<50?'#c0563b':d.acc<75?'#c79a3b':'var(--correct-border)');
    return`<div style="margin:8px 0;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span>${d.mastered?'✓ ':''}${d.name}</span><span style="color:var(--muted,#8aa);">${acc}${d.seen?' · '+d.seen:''}</span></div><div class="prog-bar" style="margin-top:3px;"><div class="prog-fill" style="width:${w}%;background:${col};"></div></div></div>`;
  }).join('');
  return`<div class="qcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;"><div style="font-weight:600;">📊 Weak spots</div><button onclick="toggleWeakness()" style="background:transparent;border:none;color:var(--muted,#8aa);font-size:12px;cursor:pointer;text-decoration:underline;">close</button></div><div style="font-size:11px;color:var(--muted,#8aa);margin-bottom:8px;">Accuracy by concept, lowest first (number = times answered). Unseen = —.</div>${rows}</div>`;
}
function renderLearn(){
  const app=document.getElementById('app');const L=stats.learn;
  if(state.learnDone){app.innerHTML=controlsHTML()+`<div class="results"><div class="results-grade">🎓 All concepts mastered</div><div class="results-label">You cleared all ${SYLLABUS.length} concepts.</div><div class="results-btns"><button class="btn primary" onclick="learnReset()">Restart the ladder</button><button class="btn info" onclick="setMode('practice')">Free practice</button><button class="btn info" onclick="toggleWeakness()">📊 Weak spots</button></div></div>`;return;}
  if(state.justMastered){app.innerHTML=controlsHTML()+`<div class="results"><div class="results-grade">✓ Concept mastered</div><div class="results-label">${state.justMastered}</div><div class="streak-bar">${[0,1,2,3,4].map(()=>`<div class="streak-dot hit"></div>`).join('')}</div><div class="results-btns"><button class="btn primary" onclick="learnContinue()">Next concept →</button></div></div>`;return;}
  const q=curQ();const C=SYLLABUS[L.concept];
  if(!q||!C){app.innerHTML=controlsHTML()+`<div class="qcard"><div class="qtext" style="font-weight:400;">No questions available for this concept.</div></div>`;return;}
  const dots=[0,1,2,3,4].map(k=>`<div class="streak-dot ${k<L.streak?'hit':''}"></div>`).join('');
  const header=`<div class="qcard" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted,#8aa);"><span>CONCEPT ${L.concept+1} / ${SYLLABUS.length} · ${Object.keys(L.mastered).length} mastered</span><span onclick="toggleWeakness()" style="cursor:pointer;text-decoration:underline;">📊 weak spots</span></div><div style="font-weight:600;font-size:15px;margin:3px 0 7px;">${C.name}</div><div class="streak-bar">${dots}</div><div style="font-size:11px;color:var(--muted,#8aa);margin-top:4px;">${L.streak}/${MASTER_N} correct in a row to master · a wrong answer resets the streak</div></div>`;
  app.innerHTML=`${controlsHTML()}${header}
    <div class="qcard"><span class="tier-badge tier-${q.tier}">${TIER_LABELS[q.tier]} · ${q.cat}</span><div class="qtext">${q.q}</div>${q.sub?`<div class="qsub">${q.sub}</div>`:''}</div>
    <div class="choices">${choicesBlock(q)}</div>${feedbackBlock(q)}
    ${state.answered?`<div class="tag-row">${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><div class="action-row" style="margin-top:9px;"><button class="btn primary" onclick="next()">${L.streak>=MASTER_N?'Concept mastered ✓ →':'Next →'}</button><button class="btn info" onclick="deeperQ()">↗ Go deeper (incognito)</button></div>`:''}`;
}
function render(){
  if(state.showWeakness){document.getElementById('app').innerHTML=controlsHTML()+weaknessHTML();return;}
  if(state.showResults){renderResults();return;}
  if(state.mode==='learn'){renderLearn();return;}
  const app=document.getElementById('app');
  if(state.queue.length===0){
    const msg=state.mode==='review'?'No missed questions yet. Answer some in Practice, Daily, or Random — the ones you miss collect here to re-drill.':'No questions match this filter. Pick another tier or category.';
    app.innerHTML=`${controlsHTML()}<div class="qcard"><div class="qtext" style="font-weight:400;">${msg}</div></div>`;return;
  }
  const q=curQ();if(!q){renderResults();return;}
  const pct=state.queue.length>0?Math.round(state.qIdx/state.queue.length*100):0;
  const depthHTML=q.depth?`<div class="depth-tag">🌍 ${q.depth}</div>`:'';
  app.innerHTML=`
    ${controlsHTML()}
    <div class="progress-row"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-label">${state.qIdx+1}/${state.queue.length}</span></div>
    <div class="qcard"><span class="tier-badge tier-${q.tier}">${TIER_LABELS[q.tier]} · ${q.cat}</span>
      <div class="qnum">Q${state.qIdx+1} of ${state.queue.length}</div>
      <div class="qtext">${q.q}</div>${q.sub?`<div class="qsub">${q.sub}</div>`:''}${depthHTML}</div>
    <div class="choices">${choicesBlock(q)}</div>${!state.answered?`<div style="text-align:center;margin-top:10px;"><button onclick="skip()" style="background:transparent;border:none;color:var(--muted,#88a);font-size:12px;cursor:pointer;text-decoration:underline;">Skip for later ⏭</button></div>`:''}${feedbackBlock(q)}
    ${state.answered?`<div class="tag-row">${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="action-row" style="margin-top:9px;">
      ${state.qIdx+1<state.queue.length?`<button class="btn primary" onclick="next()">Next →</button>`:`<button class="btn primary" onclick="next()">Results</button>`}
      <button class="btn info" onclick="deeperQ()">↗ Go deeper (incognito)</button>
    </div>`:''}`;
}

buildQueue();render();
</script>
</body>
</html>
