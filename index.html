body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

const Q=[
// ─── TIER 0: FOUNDATIONAL ────────────────────────────────────────────────────
{tier:0,id:'nh-grain',cat:'Diffusion Creep',
q:'In Nabarro–Herring creep, how does strain rate scale with grain size d?',
sub:'All other variables held constant.',
choices:['ε̇ ∝ d⁻¹','ε̇ ∝ d⁻²','ε̇ ∝ d⁻³','ε̇ is grain-size independent'],
ans:1,
cfb:'Volume diffusion through grain interiors drives N-H creep. The diffusion flux path length scales with d, so the strain rate ε̇ ∝ d⁻². Halving grain size quadruples the strain rate.',
wfb:'Path length for lattice diffusion scales with d, giving ε̇ ∝ d⁻². The d⁻³ dependence belongs to Coble creep (grain boundary diffusion). Grain-size independence is dislocation creep.',
cite:'Herring, C. (1950). J. Appl. Phys. 21, 437–445.',
tags:['Nabarro-Herring','d⁻²','diffusion creep']},

{tier:0,id:'coble-grain',cat:'Diffusion Creep',
q:'Coble creep has d⁻³ scaling versus Nabarro–Herring d⁻². Where does the extra 1/d factor come from?',
choices:['Lattice diffusion paths are longer in Coble','The grain boundary has thickness δ, adding a geometric 1/d factor from the boundary cross-section','Coble operates at higher T, amplifying the exponent','The diffusion coefficient is lower at boundaries'],
ans:1,
cfb:'Grain boundary diffusion flux ∝ d²·δ·D_gb, where δ is boundary thickness. This flux must be distributed over grain volume ∝ d³. The ratio gives ε̇ ∝ d⁻³. The extra 1/d versus N-H comes from the geometry of the boundary width relative to grain volume.',
wfb:'The extra 1/d is geometric: diffusion along boundaries of thickness δ gives an area scaling as d²·δ, but the strain that produces involves dividing by d³ (grain volume). This is the origin of d⁻³ rather than d⁻².',
cite:'Coble, R.L. (1963). J. Appl. Phys. 34, 1679–1682.',
tags:['Coble','d⁻³','grain boundary diffusion']},

{tier:0,id:'n3-double',cat:'Power-Law Creep',
q:'Stress doubles on a sample with n=3. Strain rate becomes:',
choices:['2× larger','4× larger','8× larger','9× larger'],
ans:2,
cfb:'ε̇ ∝ σⁿ, so 2³ = 8. This nonlinear amplification is why dislocation creep dominates at high stress. Compare: for n=1 (diffusion creep) doubling σ merely doubles ε̇.',
wfb:'ε̇ ∝ σ³: 2³ = 8. Not 4 (n=2), not 2 (n=1), not 9. The σ³ law comes from Weertman (1955) from first principles.',
cite:'Weertman, J. (1955). J. Appl. Phys. 26, 1213–1217.',
tags:['n=3','power-law','stress exponent']},

{tier:0,id:'maxwell-time',cat:'Viscoelasticity',
q:'τ_M = η/G for the mantle (η≈10²¹ Pa·s, G≈65 GPa). Which observation does this value explain?',
choices:['~50 yr — explains why seismic waves see elastic solid','~500–5000 yr — explains postglacial rebound timescale','~50,000 yr — explains the Wilson cycle','~5 Myr — explains the plate tectonic cycle'],
ans:1,
cfb:'τ_M ≈ 10²¹/6.5×10¹⁰ ≈ 1.5×10¹⁰ s ≈ 500–5000 yr. Seismic waves (seconds) see elastic mantle; postglacial rebound (kyr) sees viscous mantle. Same material, different timescale. This is the fundamental concept in mantle viscoelasticity.',
wfb:'τ_M = η/G ≈ 500–5000 years. Timescales well below this (seismic waves) experience elastic behavior; timescales above it (GIA, mantle convection) experience viscous flow.',
cite:'Maxwell, J.C. (1867). Phil. Trans. R. Soc. A 157, 49–88.\nPoirier (1985). Creep of Crystals, §1.1.',
tags:['Maxwell time','viscoelasticity','GIA']},

{tier:0,id:'ashby-axes',cat:'Deformation Maps',
q:'What are the two normalized axes of an Ashby deformation mechanism map?',
choices:['Log strain rate vs. temperature','σ/G vs. T/Tₘ — normalized stress vs. homologous temperature','Grain size vs. differential stress','Pressure vs. temperature'],
ans:1,
cfb:'σ/G removes the T-dependence of the shear modulus; T/Tₘ removes material-specific melting differences. This normalization makes the map universal across silicates, metals and ceramics — you can compare olivine and NaCl on the same diagram.',
wfb:'Normalizing by G and Tₘ makes the map material-independent. Grain size appears as a parameter within diffusion creep fields, not an axis.',
cite:'Frost, H.J. & Ashby, M.F. (1982). Deformation Mechanism Maps. Pergamon.',
tags:['Ashby map','σ/G','T/Tₘ','normalization']},

{tier:0,id:'wet-dry',cat:'Olivine Rheology',
q:'Hirth & Kohlstedt (2003): wet olivine is how much weaker than dry at the same P-T-stress?',
choices:['~2×','~10×','~100–1000×','Essentially the same'],
ans:2,
cfb:'2–3 orders of magnitude weaker. OH defects incorporated in the olivine lattice enhance both point defect concentrations (speeding diffusion creep) and dislocation mobility (speeding dislocation creep). The water fugacity exponent r in the flow law quantifies this.',
wfb:'Hirth & Kohlstedt (2003) showed 100–1000× weakening. This is why mantle water content is a first-order control on whether planets develop plate tectonics.',
cite:'Hirth, G. & Kohlstedt, D.L. (2003). AGU Monogr. 138, 83–105.',
tags:['water fugacity','wet dry','Hirth-Kohlstedt','olivine']},

{tier:0,id:'gss-gsi',cat:'Mechanisms',
q:'What defines the GSS vs. GSI distinction for creep mechanisms?',
choices:['GSS requires dislocations; GSI does not','GSS strain rate depends on grain size d; GSI is independent of d','GSS operates only at high T; GSI at low T','GSS requires confining pressure; GSI does not'],
ans:1,
cfb:'GSS (grain-size sensitive): Nabarro-Herring ε̇ ∝ d⁻², Coble ε̇ ∝ d⁻³. GSI (grain-size insensitive): dislocation creep has no d dependence. This distinction determines whether grain-size-reducing processes (recrystallization, phase mixing) can permanently weaken the rock.',
wfb:'The distinction is purely the grain size dependence. Both GSS and GSI can operate at high T. What matters is whether reducing d changes the strain rate.',
cite:'Hirth & Kohlstedt (2003). AGU Monogr. 138.',
tags:['GSS','GSI','grain size sensitivity']},

{tier:0,id:'stress-tensor-decomp',cat:'Continuum Mechanics',
q:'The stress tensor σᵢⱼ decomposes into hydrostatic + deviatoric parts. Which part drives creep and why?',
choices:['Hydrostatic — it is the largest component','Deviatoric σ\'ᵢⱼ — it is the traceless part that drives shape change, not volume change','Both contribute equally to plastic flow','Neither — only total confining pressure matters'],
ans:1,
cfb:'σᵢⱼ = (P)δᵢⱼ + σ\'ᵢⱼ. The hydrostatic part causes isotropic volume change. The deviatoric part (zero trace) drives shape change and is what appears in all creep flow laws. Poirier (1985, §1.1) notes explicitly: "Plastic deformation is a shear strain at constant volume that can be caused only by shear stresses; hydrostatic pressure cannot cause permanent strains."',
wfb:'Only the deviatoric part drives plastic flow. Pressure enters separately via the activation volume PV* term in the Arrhenius exponent — it modulates how fast creep occurs, but the driving force is deviatoric stress.',
cite:'Poirier (1985). Creep of Crystals, p. 13.\nTurcotte & Schubert (2002). Geodynamics, Ch. 2.',
tags:['stress tensor','deviatoric','hydrostatic','continuum mechanics']},

{tier:0,id:'orowan-eq',cat:'Dislocation Physics',
q:'Orowan\'s equation ε̇ = ρ·b·v relates strain rate to what three quantities?',
choices:['Density, bulk modulus, velocity','Mobile dislocation density ρ, Burgers vector b, average dislocation velocity v','Grain boundary density, diffusion coefficient, driving force','Vacancy concentration, jump frequency, activation energy'],
ans:1,
cfb:'ε̇ = ρ·b·v (Orowan 1940; Poirier 1985 §2.3.4). ρ = mobile dislocation length per unit volume; b = Burgers vector magnitude (the unit slip per dislocation passage); v = average velocity of mobile dislocations. This is the fundamental microscopic constitutive equation underlying all dislocation creep models.',
wfb:'Orowan\'s equation ε̇ = ρ·b·v: dislocation density × Burgers vector × velocity. From this, all power-law creep models can be derived by expressing ρ and v as functions of stress.',
cite:'Poirier (1985). Creep of Crystals, §2.3.4, p. 62.',
tags:['Orowan equation','dislocation density','Burgers vector']},

{tier:0,id:'edge-vs-screw',cat:'Dislocation Physics',
q:'What is the key geometric difference between edge and screw dislocations?',
choices:['Edge dislocations are longer than screw dislocations','For an edge dislocation the Burgers vector ⊥ the dislocation line; for a screw dislocation b ∥ the dislocation line','Edge dislocations only occur in ionic crystals; screw only in metals','Screw dislocations cannot contribute to creep'],
ans:1,
cfb:'Edge: dislocation line ⊥ Burgers vector — the line is the edge of an extra half-plane of atoms. Screw: dislocation line ∥ Burgers vector — atomic planes spiral helicoidally around the line. Turcotte & Schubert (§7.4) illustrate both. Most real dislocations have mixed edge and screw character.',
wfb:'The defining geometric relationship is between b and the line direction. Edge: b ⊥ line (extra half plane). Screw: b ∥ line (helical distortion). This determines which planes the dislocation can glide on.',
cite:'Turcotte & Schubert (2002). Geodynamics, §7.4, pp. 569–570.\nPoirier (1985). Creep of Crystals, §2.3.',
tags:['edge dislocation','screw dislocation','Burgers vector','geometry']},

{tier:0,id:'crss',cat:'Crystal Plasticity',
q:'What is the Critical Resolved Shear Stress (CRSS), and what did Schmid & Boas (1950) establish about it?',
choices:['The stress required to fracture a crystal — equals 3× the tensile strength','The minimum shear stress on a slip system needed to initiate glide — Schmid & Boas showed yield always occurs at the same CRSS regardless of crystal orientation','The confining pressure needed to prevent brittle failure','The temperature at which a crystal transitions from elastic to plastic behavior'],
ans:1,
cfb:'Schmid & Boas (1950) deformed single crystals of many orientations and found that plastic yield always begins when the resolved shear stress on the active slip system reaches a constant value — the CRSS. This makes the CRSS an intrinsic material property. For olivine, the CRSS varies by slip system, making some grains "hard" and others "soft" depending on their orientation relative to the applied stress.',
wfb:'CRSS is the minimum resolved shear stress to initiate glide on a slip system. Schmid factor = cos(λ)cos(φ) converts axial stress to resolved shear stress. The CRSS is the same regardless of sample orientation — it is a material property of the slip system.',
cite:'Poirier (1985). Creep of Crystals, p. 13.\nTullis (2002). Rev. Mineral. Geochem. 51, p. 53.',
tags:['CRSS','Schmid factor','slip system','yield']},

{tier:0,id:'miller-indices',cat:'Crystal Physics',
q:'In Miller index notation, what does the slip system (010)[100] mean?',
choices:['Slip occurs in the (010) direction on the [100] plane','Slip occurs on the (010) plane in the [100] direction','(010) and [100] are both plane normals','This notation applies only to cubic crystals'],
ans:1,
cfb:'Miller index convention: (hkl) in round brackets = the slip plane (defined by its normal). [uvw] in square brackets = the slip direction. So (010)[100] = glide on the (010) plane (the plane perpendicular to b-axis) in the [100] direction (along a-axis). This is the easiest slip system in olivine.',
wfb:'(hkl) = plane, [uvw] = direction. The slip plane is (010); the slip direction is [100]. This is the dominant easy-slip system in olivine at upper mantle conditions.',
cite:'Poirier (1985). Creep of Crystals, p. 13.\nDurham & Goetze (1977). J. Geophys. Res. 82, Table 1.',
tags:['Miller indices','slip system','notation','olivine']},

// ─── TIER 1: MECHANISTIC ─────────────────────────────────────────────────────
{tier:1,id:'weertman-deriv',cat:'Dislocation Creep',
q:'Weertman (1955) derived n=3 from first principles. What two physical scalings combine to give ε̇ ∝ σ³?',
choices:['Grain boundary area ∝ d⁻² and diffusion path ∝ d','Dislocation density ρ ∝ σ² and climb velocity vc ∝ σ, giving via Orowan: ε̇ = ρbvc ∝ σ³','Vacancy concentration ∝ σ and jump distance ∝ σ²','Peierls stress ∝ σ² and kink density ∝ σ'],
ans:1,
cfb:'Poirier (1985, §4.3): "A power-2 dependence comes from the dislocation density and a power-1 from the climb velocity." Dislocation density ρ ∝ l⁻² ∝ σ² (from elastic interaction of dislocations: the characteristic spacing l ∝ σ⁻¹). Climb velocity vc ∝ σ (linearized diffusion flux). Orowan: ε̇ = ρbvc ∝ σ²·σ = σ³.',
wfb:'The n=3 law is purely geometric: 1/r stress fields of dislocations force l ∝ σ⁻¹, hence ρ ∝ σ². Combined with vc ∝ σ from diffusion, Orowan gives ε̇ ∝ σ³.',
cite:'Weertman, J. (1955). J. Appl. Phys. 26, 1213–1217.\nPoirier (1985). §4.3.2, pp. 108–109.',
tags:['Weertman','n=3','dislocation density','climb velocity']},

{tier:1,id:'rate-limiting-si',cat:'Olivine Diffusion',
q:'Why is Si the rate-limiting species for olivine creep rather than Mg or O?',
choices:['Si has the highest concentration in olivine','Si diffuses ~3 orders of magnitude slower than Mg or O — the slowest species controls rate to maintain stoichiometry','Si bonds are strongest so it controls fracture','Si diffuses faster and sets the upper bound'],
ans:1,
cfb:'Olivine is Mg₂SiO₄: all species must diffuse proportionally to maintain stoichiometry. D_Si ≪ D_Mg, D_O by roughly 3 orders of magnitude. The slowest diffuser bottlenecks the process. This sets the activation energy Q for olivine creep. Bai et al. (1991) confirmed the activation energy is larger than for self-diffusion of O or Si in most conditions.',
wfb:'It\'s the slowest that controls, not the fastest. Si is the slowest major diffusing species in olivine. Hence Q for creep reflects Si mobility.',
cite:'Hirth & Kohlstedt (2003). AGU Monogr. 138.\nBai et al. (1991). J. Geophys. Res. 96, 2441–2463.',
tags:['Si diffusion','rate-limiting','activation energy','stoichiometry']},

{tier:1,id:'piezometer-concept',cat:'Microstructure',
q:'A recrystallized grain size piezometer uses d_rx = A·σ⁻ᵖ. How is it applied to natural rocks?',
choices:['d_rx gives finite strain magnitude directly','Measuring d_rx in exhumed peridotite and inverting for paleodifferential stress σ','d_rx gives deformation temperature via thermometry','d_rx gives the original pre-deformation grain size'],
ans:1,
cfb:'During dynamic recrystallization, d_rx reaches a stress-dependent steady state. Measuring d_rx optically or by EBSD in a natural peridotite, then using the calibrated A and p (from Van der Wal et al. 1993 for olivine), recovers the differential stress that was active during deformation. This is called a paleostress estimate.',
wfb:'Piezometer = stress gauge. d_rx gives stress, not strain or temperature. The calibration comes from laboratory experiments where both d_rx and σ are measured simultaneously.',
cite:'Van der Wal, D. et al. (1993). Geophys. Res. Lett. 20, 1479–1482.',
tags:['piezometer','paleostress','d_rx','EBSD']},

{tier:1,id:'peierls-conditions',cat:'Low-T Plasticity',
q:'The Peierls mechanism gives an exponential flow law rather than a power law. What physical condition makes it dominate over power-law creep?',
choices:['High temperature and low stress — easier to overcome Peierls barriers thermally','Low homologous temperature T/Tₘ and high strain rate — the lattice resistance dominates before thermally-activated recovery can operate','High confining pressure that stabilizes dislocations','Wet conditions that reduce lattice resistance'],
ans:1,
cfb:'The Peierls-Nabarro barrier is the periodic lattice potential that resists dislocation glide. At low T/Tₘ, thermal activation cannot help much, so glide requires stress alone to overcome the barrier. Hansen et al. (2019) studied this in olivine using the D-DIA at APS and found significant strain hardening at low T, consistent with Peierls-dominated flow.',
wfb:'Peierls dominates when thermal energy kT is small compared to the Peierls barrier height — i.e., low T/Tₘ. At high T, climb and cross-slip become thermally activated and dislocation creep (power law) takes over.',
cite:'Peierls, R. (1940). Proc. Phys. Soc. 52, 34–37.\nHansen et al. (2019). J. Geophys. Res. 124.',
tags:['Peierls','low-T plasticity','exponential flow law'],
depth:'Dominant in subducting slabs and lower lithosphere: T/Tₘ < 0.5'},

{tier:1,id:'frank-read',cat:'Dislocation Physics',
q:'What is a Frank-Read source, and why is it important for sustained plastic deformation?',
choices:['A grain boundary that acts as a vacancy source for diffusion creep','A pinned dislocation segment that bows out under stress, emits expanding loops, and springs back to repeat — generating new dislocations continuously','A point defect cluster that nucleates new grains during recrystallization','A twin boundary that produces slip without dislocation multiplication'],
ans:1,
cfb:'Poirier (1985, §2.3.1): a dislocation segment pinned at both ends bows out under shear stress. When it reaches the semicircular critical configuration it becomes unstable, wraps around, the two ends annihilate, and a closed loop is emitted while the segment springs back. This cycle repeats continuously. Frank-Read sources are the principal mechanism for dislocation multiplication during deformation — without them, dislocations would be exhausted.',
wfb:'Frank-Read source: pinned segment → bows out → emits loop → repeats. Critical stress σ_c ≈ 2μb/l, where l is the segment length. Shorter pinned segments require higher stress to activate.',
cite:'Poirier (1985). Creep of Crystals, §2.3.1, pp. 54–55.',
tags:['Frank-Read source','dislocation multiplication','pinned segment']},

{tier:1,id:'climb-mechanism',cat:'Dislocation Physics',
q:'Dislocation climb moves an edge dislocation perpendicular to its glide plane. What drives it, and why is it thermally activated?',
choices:['Applied shear stress drives climb directly, no thermal activation needed','Vacancy absorption/emission at jogs on the dislocation line moves it perpendicular to its glide plane — requires diffusion, which is thermally activated','Climb is driven by confining pressure squeezing out atoms','Cross-slip of screw components drives the edge portions perpendicularly'],
ans:1,
cfb:'Poirier (1985, §2.3.3): climb occurs when vacancies are absorbed or emitted at jogs on the dislocation line. This requires atomic diffusion — vacancies must migrate to/from the dislocation. Since diffusion is thermally activated (D ∝ exp(−Q/RT)), climb is strongly T-dependent. This is why dislocation creep (recovery-controlled by climb) has the Arrhenius temperature dependence.',
wfb:'Climb requires matter transport to/from the dislocation. This transport is diffusional and thermally activated. Applied shear stress provides the driving force; thermal energy provides the mobility.',
cite:'Poirier (1985). Creep of Crystals, §2.3.3, pp. 58–62.',
tags:['dislocation climb','jog','vacancy diffusion','thermal activation']},

{tier:1,id:'karato-wu-synthesis',cat:'Mantle Rheology',
q:'What was the key finding of Karato & Wu (1993) about the dominant creep mechanism in the upper mantle?',
choices:['Dislocation creep dominates throughout the entire upper mantle regardless of grain size','Dislocation creep dominates in the lithosphere, but diffusion creep may dominate at depth where grain sizes can be small after recrystallization','Diffusion creep dominates everywhere in the mantle','The upper mantle is essentially elastic at all geodynamic timescales'],
ans:1,
cfb:'Karato & Wu synthesized olivine flow laws and mantle P-T conditions to show: at lithospheric grain sizes (mm-scale) and stresses, dislocation creep wins. But in zones of fine recrystallized grain size (near subducting slabs), the crossover stress drops and diffusion creep can dominate. This grain-size-dependent mechanism transition became the foundation for all subsequent mantle viscosity models.',
wfb:'The mechanism depends on grain size, not depth alone. Karato & Wu (1993) is the paper that established this grain-size-dependent crossover as a key control on mantle dynamics.',
cite:'Karato, S. & Wu, P. (1993). Science 260, 771–778.',
tags:['Karato Wu','mechanism transition','grain size','mantle viscosity']},

{tier:1,id:'olivine-slip-systems',cat:'Crystal Physics',
q:'Durham & Goetze (1977) identified the active slip systems in olivine. What are the only three Burgers vectors that contribute to slip?',
choices:['[110], [101], [011] — the face-diagonal directions','[100], [010], [001] — the three crystallographic axis directions','[111] and equivalents — body diagonal','[100] only — olivine has one dominant Burgers vector'],
ans:1,
cfb:'Using shape change analysis of 41 oriented San Carlos olivine crystals and dislocation decoration, Durham & Goetze confirmed that only b = [100], [010], and [001] are significant. On-axis samples showed no shape change, ruling out all other b types. The active slip systems are (010)[100], (001)[100], (010)[001], with (010)[100] easiest.',
wfb:'Durham & Goetze (1977) Part 1: on-axis and 45° orientation shape change analysis conclusively showed only [100], [010], [001] Burgers vectors. Slip on other systems would have produced observable shape changes that were not found.',
cite:'Durham, W.B. & Goetze, C. (1977). J. Geophys. Res. 82, 5737–5753.',
tags:['Durham Goetze','olivine slip systems','Burgers vector','[100][010][001]']},

{tier:1,id:'olivine-structure',cat:'Crystal Physics',
q:'Olivine (Mg₂SiO₄) has what crystal symmetry, and how does this affect its slip behavior?',
choices:['Cubic symmetry — equal slip in all 12 equivalent directions','Orthorhombic symmetry — three unequal crystallographic directions give three distinct Burgers vectors with different CRSS values','Hexagonal symmetry — basal slip dominates as in quartz','Monoclinic symmetry — slip is restricted to one plane'],
ans:1,
cfb:'Olivine is orthorhombic (space group Pbnm). Oxygen ions form a quasi-hexagonal close-packed framework, but cation filling gives three distinct crystallographic axes a, b, c with unequal lattice parameters. This anisotropy means [100], [010], [001] have different CRSS values — making (010)[100] the easiest slip system and explaining why olivine CPO develops with [100] preferentially aligned with flow. Poirier (1985) notes the oxygen HCP framework and its relation to slip system geometry.',
wfb:'Orthorhombic symmetry → three non-equivalent axes → three different Burgers vectors with different CRSS → anisotropic plastic behavior. This is why olivine CPO is interpretable in terms of the applied stress field.',
cite:'Poirier (1985). Creep of Crystals, §4.5, p. 138.\nDurham & Goetze (1977). J. Geophys. Res. 82.',
tags:['olivine','orthorhombic','crystal structure','anisotropy']},

{tier:1,id:'cpo-atype',cat:'CPO Fabrics',
q:'Olivine A-type fabric: [100] aligns parallel to the shear direction. Under what conditions does this form, and why does it matter seismically?',
choices:['[100] perpendicular to shear; forms under wet, high-stress conditions','[100] parallel to shear direction; forms under dry, moderate stress; fastest P-wave velocity along [100] so A-type predicts seismic fast axis || mantle flow','[100] parallel to the compression axis; forms under high confining pressure','[100] random; forms only during diffusion creep'],
ans:1,
cfb:'A-type CPO (Karato et al. 2008): [100] || shear direction, formed under dry, low-to-moderate stress. Olivine P-wave velocity is fastest along [100], so A-type fabric predicts that seismic anisotropy fast axes are parallel to mantle flow direction. This is the fundamental link between seismic anisotropy observations and mantle dynamics interpretation.',
wfb:'A-type: [100] || flow, dry, moderate stress. B-type ([001] || flow) forms under high water and stress — gives opposite seismic interpretation. The fabric type matters enormously for interpreting SKS splitting.',
cite:'Karato, S. et al. (2008). Annu. Rev. Earth Planet. Sci. 36, 59–95.',
tags:['A-type CPO','seismic anisotropy','shear flow','olivine LPO']},

{tier:1,id:'bai-n35',cat:'Olivine Rheology',
q:'Bai, Mackwell & Kohlstedt (1991) deformed olivine single crystals at all 45° orientations with controlled fO₂ and a_opx. What was the key finding about n?',
choices:['n varies from 1 to 5 depending on orientation and conditions','n = 3.5 ± 0.1 is constant across all three orientations and the full range of T and fO₂ — suggesting a single rate-limiting dislocation mechanism','n = 1 for all conditions — diffusion creep dominates','n increases with water content up to n = 7'],
ans:1,
cfb:'Bai et al. (1991) deformed [101]_c, [011]_c, and [110]_c orientations across the entire fO₂ stability field. Despite different active slip systems and different sensitivities to fO₂, n = 3.5 ± 0.1 was constant. This suggests a single type of dislocation process controls the rate regardless of orientation, consistent with a climb-controlled mechanism (Weertman n=3 modified by non-idealities).',
wfb:'The constancy of n = 3.5 ± 0.1 across very different conditions and orientations was the key result. It rules out models where the rate-limiting step changes with orientation or fO₂.',
cite:'Bai, Q., Mackwell, S.J. & Kohlstedt, D.L. (1991). J. Geophys. Res. 96, 2441–2463.',
tags:['Bai Mackwell Kohlstedt','n=3.5','olivine single crystal','fO2']},

{tier:1,id:'recryst-regimes',cat:'Dynamic Recrystallization',
q:'Tullis (2002) describes three dynamic recrystallization regimes with increasing T. What drives the transition between them?',
choices:['Increasing grain size drives transition from bulging to migration recrystallization','Increasing T raises grain boundary mobility, transitioning from bulging recrystallization → subgrain rotation → grain boundary migration recrystallization','Increasing pressure suppresses all three regimes','Water content switches between regimes'],
ans:1,
cfb:'Regime 1 (low T): bulging recrystallization — dislocation density contrasts drive grain boundary migration into strained grains, producing tiny recrystallized grains along boundaries. Regime 2: subgrain rotation — progressive misorientation of subgrains until they become new high-angle boundaries (~10° misorientation). Regime 3 (high T): grain boundary migration — high boundary mobility drives rapid migration from low to high dislocation density regions.',
wfb:'Temperature controls grain boundary mobility. Low T: bulging. Moderate T: subgrain rotation. High T: grain boundary migration. Each regime produces diagnostic microstructures readable in EBSD.',
cite:'Tullis, J. (2002). Rev. Mineral. Geochem. 51, 51–95.',
tags:['dynamic recrystallization','Tullis','bulging','subgrain rotation','GBM']},

{tier:1,id:'subgrain-piezometer',cat:'Microstructure',
q:'Subgrain size d_sg ∝ σ⁻¹. What is the physical reason, and how is this used?',
choices:['Subgrain size tracks grain growth kinetics — larger at higher T','Subgrain size reflects the balance between dislocation generation (creating walls) and recovery (annihilating them) — it scales as σ⁻¹ from the elastic interaction length of dislocation arrays. Measured by EBSD, it gives paleostress.','Subgrain size measures the distance between Frank-Read sources','Subgrain size is controlled by water content, not stress'],
ans:1,
cfb:'Subgrains form as low-angle tilt walls (arrays of edge dislocations). The wall spacing is set by the elastic interaction length l ∝ μb/σ ∝ σ⁻¹. This is a direct prediction of dislocation mechanics. Measuring d_sg by EBSD gives a complementary paleostress estimate to the recrystallized grain size piezometer. Dislocation density ρ ∝ σ² provides a third independent estimate via TEM.',
wfb:'d_sg ∝ σ⁻¹ comes from the elastic stress field of dislocations: the equilibrium spacing between walls scales as l ∝ σ⁻¹. Not related to temperature or water content directly.',
cite:'Poirier (1985). Creep of Crystals, §6.1, pp. 172–175.',
tags:['subgrain','paleostress','tilt boundary','EBSD']},

// ─── TIER 2: ADVANCED ────────────────────────────────────────────────────────
{tier:2,id:'ddia-synchrotron',cat:'Apparatus',
q:'In a D-DIA experiment at APS, how is in-situ differential stress measured to ~20 MPa precision?',
choices:['External load cells corrected for solid-medium friction','Azimuthal d-spacing variation on the XRD Debye ring — stress makes the ring elliptical, and the azimuthal variation inverted via single-crystal elastic moduli gives σ','Acoustic emission event rate calibrated to stress','Volume strain from X-ray imaging gives stress via elastic moduli'],
ans:1,
cfb:'Under hydrostatic conditions, the Debye diffraction ring is circular. Deviatoric stress makes it elliptical. The azimuthal variation δ(d/d₀) = f(azimuth) is related to stress through the lattice strain theory (Singh et al. 1998). Single-crystal elastic moduli convert d-spacing anisotropy to stress. Weidner et al. (2010) refined this for white-beam XRD at APS. This is the measurement technique in your D-DIA experiments at sectors 13/16.',
wfb:'External load cells cannot account for solid-medium friction — they always overestimate stress. The XRD method measures stress directly in the sample lattice, bypassing this problem.',
cite:'Singh, A.K. et al. (1998). J. Appl. Phys. 83, 7567.\nWeidner, D.J. et al. (2010). Rev. Sci. Instrum. 81.',
tags:['D-DIA','APS','synchrotron','XRD stress','Debye ring'],
depth:'D-DIA: 0–15 GPa = 0–450 km; transition zone accessible'},

{tier:2,id:'composite-crossover',cat:'Flow Laws',
q:'In a composite flow law ε̇ = ε̇_disl + ε̇_diff, what sets the crossover stress between dominant mechanisms?',
choices:['Fixed by temperature alone — crossover T is a material constant','Crossover stress σ_c depends on grain size: smaller d shifts σ_c higher because ε̇_diff ∝ d⁻² while ε̇_disl is grain-size independent','Crossover is always at ~100 km depth regardless of grain size','Crossover is set only by water content'],
ans:1,
cfb:'Setting ε̇_disl = ε̇_diff and solving for σ: σ_c = f(d, T, P). Since ε̇_diff ∝ d⁻² and ε̇_disl is grain-size independent, reducing d by half pushes σ_c to 4× higher stress (for n=3, m=2 case). Grain-size-reducing processes (recrystallization near slabs, phase mixing) can therefore flip the dominant mechanism at constant P-T conditions — the engine of grain-size feedback in the mantle.',
wfb:'The crossover is grain-size dependent, not fixed. This is why Karato & Wu (1993) emphasized grain size as a key unknown in mantle rheology.',
cite:'Hirth & Kohlstedt (2003). AGU Monogr. 138, 83–105.',
tags:['composite flow law','crossover stress','grain size','mechanism transition']},

{tier:2,id:'shear-heating',cat:'Shear Localization',
q:'What positive feedback drives shear heating instability, and what is the Gruntfest criterion for runaway?',
choices:['More recrystallization → smaller grain size → weaker material — grain damage feedback','Viscous dissipation σ·ε̇ heats the zone → Arrhenius η drops → ε̇ increases at same σ → more heat; runaway when heat generation rate exceeds diffusive removal','Water release during mineral reactions lowers viscosity and causes localization','Phase transitions release latent heat that drives runaway'],
ans:1,
cfb:'Gruntfest (1963) derived the criterion: runaway when the dimensionless Brinkman number exceeds a critical value, i.e., when σ·ε̇·L²/(k·ΔT) > critical, where L is shear zone thickness and k is thermal conductivity. Hobbs et al. (1986) applied this to lithospheric shear zones. The Arrhenius viscosity (η ∝ exp(Q/RT)) creates the positive feedback: any temperature rise reduces η exponentially.',
wfb:'The feedback is purely thermal, not grain-size based. Grain-size weakening is a separate mechanism (though both can co-operate). The key is the exponential T-dependence of viscosity.',
cite:'Gruntfest, I.J. (1963). Trans. Soc. Rheol. 7, 195.\nHobbs, B.E. et al. (1986). Pure Appl. Geophys. 124, 309.',
tags:['shear heating','thermal runaway','Gruntfest criterion','localization']},

{tier:2,id:'phase-mixing-drop',cat:'Mylonites',
q:'In polyphase (olivine + pyroxene) torsion experiments, two stress drops occur. What causes the second drop at γ ≈ 10–20?',
choices:['Olivine CPO saturates and fabric stops providing strain hardening','Phase mixing: secondary phases distributed along grain boundaries pin grain growth of the primary phase, enabling GSS creep at stresses where single-phase material would be in dislocation creep','The sample partially melts from accumulated viscous heat','Dynamic recrystallization reaches the piezometric grain size'],
ans:1,
cfb:'Bercovici & Ricard (2012) and Bercovici et al. (2023): the first stress drop is piezometric steady state (d_rx reaches equilibrium). The second at γ~10–20 is phase mixing — secondary pyroxene grains migrate to olivine grain boundaries, pinning growth. The aggregate permanently shifts to GSS creep. This is the "grain damage" mechanism for plate boundary formation. The LVT at WashU directly tests this.',
wfb:'CPO saturation causes the first stress drop. Phase mixing causes the second. The distinction is critical — phase mixing gives permanent weakening even after stress is removed, which is why it matters for plate tectonics.',
cite:'Bercovici & Ricard (2012). Phys. Earth Planet. Int. 202–203, 27–55.\nBercovici et al. (2023). GJI 232, 2205.',
tags:['phase mixing','grain damage','second stress drop','permanent weakening']},

{tier:2,id:'lvt-vs-axial',cat:'Apparatus',
q:'Why does torsional geometry (LVT, RDA) give access to microstructural steady states that axial compression cannot reach?',
choices:['Torsion reaches higher confining pressure than axial compression','Torsion continuously shears the same sample volume, accumulating γ > 100, while axial compression is geometrically limited to ε ≈ 0.5 before barreling or end-cap effects dominate','Torsion provides more accurate stress measurement due to uniform stress state','Torsion allows higher temperature experiments'],
ans:1,
cfb:'Skemer et al. (2025): "The LVT enables the generation of extremely large shear strains (γ > 100)." CPO saturation, dynamic recrystallization steady state, and phase mixing all require strains well beyond ε = 0.5 to develop fully. Axial compression is limited geometrically — sample geometry becomes non-cylindrical, and friction on end caps creates non-uniform stress. Torsion has no such geometric limit.',
wfb:'The advantage is purely kinematic: torsion has no geometric strain limit. Pressure, stress measurement, and temperature ranges are not the key distinctions between axial and torsional geometries.',
cite:'Skemer, P. et al. (2025). Rev. Sci. Instrum. 96, 023903.',
tags:['LVT','RDA','torsion','large strain','γ>100'],
depth:'LVT: 0–3 GPa = 0–100 km depth, but γ > 100 accessible'},

{tier:2,id:'activation-volume',cat:'Deep Earth',
q:'Ita & Cohen (1998): why does pressure dramatically increase lower mantle viscosity beyond temperature scaling?',
choices:['Pressure increases grain size, suppressing GSS creep','PV* in D = D₀·exp(−(E+PV*)/RT) grows with pressure, raising the activation barrier for diffusion exponentially','Pressure phase transitions change the dominant slip system to a harder configuration','Dense packing under pressure reduces dislocation mobility mechanically'],
ans:1,
cfb:'The activation volume V* enters the Arrhenius exponent as PV*/RT. At lower mantle pressures (~25–130 GPa), PV* can equal or exceed E for typical V* values of 2–6 cm³/mol. This exponentially suppresses diffusion far beyond what the geotherm T increase compensates. Ita & Cohen calculated this for MgO using first-principles and found viscosity much higher than T-scaling alone predicts.',
wfb:'The mechanism is the PV* term in the Arrhenius exponent. Even modest V* values become significant at >20 GPa. This is why the lower mantle is estimated to be 100–1000× more viscous than the upper mantle.',
cite:'Ita, J. & Cohen, R.E. (1998). Geophys. Res. Lett. 25, 1095–1098.',
tags:['activation volume','PV*','lower mantle','viscosity','Ita Cohen'],
depth:'>660 km, >23 GPa — beyond D-DIA range'},

{tier:2,id:'melt-contiguity',cat:'Partial Melt',
q:'Why does even a small melt fraction φ ≈ 1–5% dramatically weaken olivine aggregates?',
choices:['Melt lubricates grain boundaries like oil — purely mechanical effect','Melt preferentially wets grain boundaries perpendicular to σ₁, reducing the contiguity parameter Ψ (grain-grain contact fraction), which controls load-bearing capacity — this plus diffusion along melt-wetted boundaries gives strong weakening','Melt dissolves Si, reducing the rate-limiting diffusion barrier','Melt fills subgrain boundaries, eliminating the stress field that pins dislocations'],
ans:1,
cfb:'Takei & Holtzman (2009) formalized the contiguity model: Ψ = fraction of grain surface in solid-solid contact. Melt pockets at grain boundaries reduce Ψ. Since load is carried through solid contacts, low Ψ dramatically reduces effective viscosity. Cooper & Kohlstedt (1984) measured the effect experimentally. Relevant to weakening under MOR and in subduction zones with slab-derived fluids.',
wfb:'The contiguity model is the key framework: melt reduces solid-solid contacts, and load must be supported by remaining contacts. This gives η_eff/η_solid = f(Ψ), with strong sensitivity to even small melt fractions.',
cite:'Cooper & Kohlstedt (1984). Tectonophysics 107, 207.\nTakei & Holtzman (2009). J. Geophys. Res. 114, B06205.',
tags:['partial melt','contiguity','melt weakening','grain boundary']},

{tier:2,id:'wiesman-twophase',cat:'Mineral Physics',
q:'Wiesman et al. (2023) deformed olivine + ferropericlase aggregates. Why is the strength contrast between phases important for aggregate rheology?',
choices:['Phase contrast has no effect — the aggregate takes the arithmetic mean viscosity','Ferropericlase is significantly weaker than olivine at relevant conditions — its connectivity controls whether the weak phase can create a low-viscosity network through the aggregate','Ferropericlase is stronger, so it strengthens the aggregate at all compositions','Only the phase proportions matter, not the strength contrast'],
ans:1,
cfb:'In polyphase aggregates, if the weak phase (ferropericlase) forms an interconnected network, the aggregate rheology approaches the weak end-member. If isolated, it approaches the strong end-member. The olivine–ferropericlase system is relevant to the transition zone and lower mantle where both phases coexist. Wiesman et al. (2023) showed that the deformation partitioning between phases controls CPO development and effective viscosity.',
wfb:'Strength contrast + phase geometry determines whether the weak phase can create a load-bearing bypass path. This is the core issue in two-phase aggregate rheology.',
cite:'Wiesman, H.M. et al. (2023). J. Geophys. Res. (see project files).',
tags:['Wiesman','olivine ferropericlase','two-phase rheology','strength contrast']},

// ─── TIER 3: ATTRIBUTION ─────────────────────────────────────────────────────
{tier:3,id:'who-nabarro',cat:'Attribution',
q:'Who first proposed that non-hydrostatic stress creates vacancy concentration gradients in crystals, driving diffusion without dislocations?',
choices:['Herring (1950) — derived the quantitative creep law','Nabarro (1948) — proposed the physical mechanism conceptually at the Bristol Conference on Strength of Solids','Coble (1963) — extended the idea to grain boundary diffusion','Weertman (1955) — first applied diffusion to creep'],
ans:1,
cfb:'Nabarro (1948) presented the concept at the Bristol Conference: non-hydrostatic stress modifies vacancy formation energy differently on differently-oriented crystal faces, creating a vacancy flux that causes shape change without dislocations. Herring (1950) then turned this into the quantitative ε̇ ∝ σd⁻²/T law. The mechanism is named Nabarro-Herring to credit both contributions.',
wfb:'Nabarro proposed the mechanism (1948); Herring quantified it (1950). This is one of the most important distinctions in the history of creep theory.',
cite:'Nabarro, F.R.N. (1948). Rep. Conf. Strength Solids, Phys. Soc. London, 75–90.',
tags:['Nabarro','attribution','diffusion creep','1948']},

{tier:3,id:'who-weertman',cat:'Attribution',
q:'What was Weertman\'s (1955) actual innovation — and what did Poirier (1985) say was its significance?',
choices:['He discovered that olivine deforms by dislocation creep','He was the first to derive power-law creep (n=3) from first principles — Poirier called it "the first physical model of creep from which nearly all other models can be derived"','He measured n=3 empirically in metals','He showed that n=3 applies only to metals, not silicates'],
ans:1,
cfb:'Poirier (1985, §4.3.3): "Weertman\'s (1968, 1972) model stands apart... because of its importance in the literature as the first physical model of creep, and also because nearly all the other models can be derived from it." The innovation was deriving σ³ from microphysics (ρ ∝ σ², vc ∝ σ) rather than curve-fitting. Before 1955, power-law creep was purely empirical.',
wfb:'The significance is the derivation from first principles. Weertman showed why n=3 must emerge from climb-controlled recovery, not just that it does empirically.',
cite:'Weertman, J. (1955). J. Appl. Phys. 26, 1213–1217.\nPoirier (1985). §4.3.3, p. 108.',
tags:['Weertman','attribution','first physical model','n=3']},

{tier:3,id:'who-durham',cat:'Attribution',
q:'What specific experimental technique made Durham & Goetze (1977) able to identify slip systems in olivine definitively?',
choices:['Transmission electron microscopy of all 41 samples','Oxidation-decoration of dislocations combined with shape change analysis of oriented single crystals — made dislocation structures visible optically','Synchrotron X-ray diffraction for in-situ lattice strain','X-ray tomography of deformed specimens'],
ans:1,
cfb:'Durham & Goetze used an oxidation-decoration technique (Kohlstedt et al. 1976) to image dislocations optically in olivine — a critical advantage since olivine is nearly transparent. Dislocation segments decorated as oxide precipitates made edge vs. screw character visible. Combined with precise shape change analysis of 41 selectively oriented crystals, this gave unambiguous slip system identification. Part 2 (Durham, Goetze & Blake 1977) reported the dislocation structures.',
wfb:'The oxidation-decoration technique was what made this study possible — it allowed optical dislocation imaging in a normally transparent mineral. The combination with shape change analysis gave definitive slip system identification.',
cite:'Durham, W.B. & Goetze, C. (1977). J. Geophys. Res. 82, 5737–5753.\nDurham, W.B., Goetze, C. & Blake, B. (1977). J. Geophys. Res. 82, 5755.',
tags:['Durham Goetze','dislocation decoration','olivine slip systems','experimental technique']},

{tier:3,id:'who-hk',cat:'Attribution',
q:'What is the specific contribution of Hirth & Kohlstedt (2003) that makes it the most-cited olivine rheology paper?',
choices:['First lab deformation of olivine at any conditions','Synthesis of a composite olivine flow law with explicit water fugacity dependence, showing 2–3 orders of magnitude weakening by water','Discovery that olivine deforms by dislocation creep','Development of the D-DIA'],
ans:1,
cfb:'Hirth & Kohlstedt (2003) synthesized two decades of experimental data into a single composite flow law: ε̇ = A·σⁿ·d⁻ᵐ·fH₂Oʳ·exp(−(E+PV)/RT), covering both diffusion and dislocation creep with explicit fH₂O. Quantifying 100–1000× weakening by water in a usable parameterized form made it the standard input for all subsequent geodynamic models of the upper mantle.',
wfb:'The key contributions are: (1) composite law covering both mechanisms, (2) explicit and quantified water fugacity dependence, (3) parameterization suitable for geodynamic modeling.',
cite:'Hirth, G. & Kohlstedt, D.L. (2003). AGU Monogr. 138, 83–105.',
tags:['Hirth Kohlstedt','attribution','water fugacity','composite flow law']},

{tier:3,id:'who-wang',cat:'Attribution',
q:'Wang et al. (2003) designed the D-DIA. What was the critical modification to the existing DIA cubic-anvil press?',
choices:['Replacement of WC anvils with sintered diamond','Addition of two independently-driven differential rams to the existing DIA press, enabling controlled deviatoric strain to 15 GPa with simultaneous synchrotron XRD stress measurement','First use of X-ray transparent anvils in any multi-anvil press','Development of the resistance-heated furnace assembly'],
ans:1,
cfb:'The DIA cubic-anvil press already existed for generating high-pressure hydrostatic conditions. Wang et al. added two differential rams (upper and lower guide blocks driven independently), converting it into a deformation apparatus. Combined with X-ray transparent cBN (cubic boron nitride) anvils, this enabled in-situ synchrotron stress measurement during deformation at pressures up to 15 GPa — pushing accessible rheology from 120 km (Griggs limit) to 450 km depth.',
wfb:'The innovation was the differential rams, not the anvil material or X-ray use per se. The rams convert a hydrostatic press into a deformation device.',
cite:'Wang, Y. et al. (2003). Rev. Sci. Instrum. 74, 3002–3011.',
tags:['Wang D-DIA','differential rams','apparatus innovation','15 GPa']},

{tier:3,id:'who-yamazaki',cat:'Attribution',
q:'Yamazaki & Karato (2001) developed the RDA. What was novel about their design compared to axial deformation devices?',
choices:['First apparatus to reach 15 GPa at any temperature','Modified a Drickamer opposed-anvil device with a rotation actuator — enabling torsion (simple shear geometry) at 15 GPa, giving large shear strains inaccessible to axial compression','First apparatus with synchrotron capability at transition zone pressures','First apparatus with controlled strain rate rather than stress'],
ans:1,
cfb:'The Rotational Drickamer Apparatus: Yamazaki & Karato took a Drickamer opposed-anvil press and added a DC servomotor + gearbox rotation actuator. Rotating one anvil while the other is stationary imposes simple shear on the thin disk sample (≤0.8 mm thick). This gives unlimited shear strain in principle, enabling steady-state microstructure studies at 15 GPa — impossible in any axial apparatus. The LVT at WashU is conceptually derived from this.',
wfb:'The innovation was torsion geometry at high pressure, not the pressure range itself. The RDA was the first apparatus to combine high pressure with torsional deformation.',
cite:'Yamazaki, D. & Karato, S. (2001). Rev. Sci. Instrum. 72, 4207–4211.',
tags:['RDA','Yamazaki Karato','torsion','high pressure'],
depth:'RDA: 0–15 GPa = 0–450 km, torsion geometry'},

{tier:3,id:'who-ito89',cat:'Attribution',
q:'Ito & Takahashi (1989) settled the nature of the 660 km discontinuity. What were their two key findings?',
choices:['The 660 is a chemical boundary between pyrolite and eclogite','(1) The post-spinel transition (ringwoodite → bridgmanite + periclase) occurs at 23–24 GPa, matching 660 km depth, and (2) the negative Clapeyron slope means cold slabs depress the boundary, creating buoyancy opposing penetration','The 660 is caused by partial melting at the base of the transition zone','The 660 has a positive Clapeyron slope that aids whole-mantle convection'],
ans:1,
cfb:'Ito & Takahashi (1989) used a uniaxial split-sphere apparatus to determine: (1) P(GPa) = 27.6–0.0028T(°C) for the post-spinel transition — plotting this against a mantle geotherm puts it at ~660 km. (2) The negative Clapeyron slope means the transition is deeper under cold material (slabs), creating a mass excess that resists slab penetration. The transition width (<0.15 GPa) explains why the 660 is seismically sharp.',
wfb:'Two findings: (1) correct pressure matches 660 km depth, (2) negative Clapeyron slope has convection implications for slab stagnation. Both are in the Ito & Takahashi (1989) paper.',
cite:'Ito, E. & Takahashi, E. (1989). J. Geophys. Res. 94, 10637–10646.',
tags:['Ito Takahashi','660 km','post-spinel','Clapeyron slope'],
depth:'23–24 GPa = 660 km; ringwoodite → bridgmanite + ferropericlase'},

{tier:3,id:'who-bercovici',cat:'Attribution',
q:'What is the central innovation of Bercovici & Ricard (2012) for explaining plate boundary persistence?',
choices:['Thermal convection alone generates plate-like behavior without weakening','Phase mixing in polyphase rocks (olivine + pyroxene) enables grain-size sensitive creep via grain damage, creating permanent weakening that persists after deformation stops — giving plate boundaries long-term "memory"','Slab pull alone generates sufficient stress to maintain plate boundaries indefinitely','Melt weakening at mid-ocean ridges initiates and sustains all plate boundaries'],
ans:1,
cfb:'The problem: single-phase rocks recover grain size and strength after deformation stops. Bercovici & Ricard showed that in olivine + pyroxene, phase mixing distributes secondary phases along grain boundaries, pinning them and preventing grain growth. This maintains low viscosity indefinitely — providing the memory that allows dormant plate boundaries to reactivate. This is the core mechanism behind the grain damage theory of plate tectonics.',
wfb:'The key innovation is "grain damage memory" from phase mixing. Single-phase grain damage is reversible; two-phase damage is not, because grain growth is pinned.',
cite:'Bercovici, D. & Ricard, Y. (2012). Phys. Earth Planet. Int. 202–203, 27–55.',
tags:['Bercovici Ricard','grain damage','plate boundary memory','phase mixing']},

{tier:3,id:'who-poirier',cat:'Attribution',
q:'What is the canonical contribution of Poirier\'s 1985 book Creep of Crystals?',
choices:['First experimental measurements of olivine creep rates','First unified theoretical framework classifying crystal creep by rate-limiting process (glide-controlled, climb-controlled, diffusion-controlled) across all materials — the standard reference for understanding flow law microphysics','Development of the composite flow law for mantle minerals','First application of synchrotron XRD to crystal deformation'],
ans:1,
cfb:'Poirier (1985) synthesized dislocation physics, diffusion theory, and crystal mechanics into a unified framework applicable to metals, ceramics, and minerals. The classification by rate-limiting process — Peierls/glide-controlled, recovery/climb-controlled, diffusion creep — is the organizing principle still used today. The book is the standard reference for the physical meaning behind empirical flow law parameters.',
wfb:'Poirier is a theoretical synthesis, not an experimental paper. Its contribution is the unified physical framework and the connections between microphysics and macroscopic flow laws.',
cite:'Poirier, J.-P. (1985). Creep of Crystals. Cambridge University Press.',
tags:['Poirier','Creep of Crystals','rate-limiting process','theoretical framework']},

// ─── TIER 4: DEPTH & APPARATUS INTUITION ────────────────────────────────────
{tier:4,id:'depth-griggs',cat:'Apparatus & Depth',
q:'Griggs apparatus max pressure is ~4 GPa. What depth and mineral assemblage does this correspond to?',
choices:['~50 km — lower crust, plagioclase + pyroxene stable','~120 km — upper lithospheric mantle, olivine α-phase (forsterite, orthorhombic Pbnm) stable','~410 km — the olivine→wadsleyite transition','~660 km — the ringwoodite→bridgmanite transition'],
ans:1,
cfb:'4 GPa ÷ 0.033 GPa/km ≈ 120 km. This is sub-lithospheric upper mantle — olivine α-phase (Mg₂SiO₄, orthorhombic) is stable throughout. The 410 km transition to wadsleyite requires ~14 GPa, far above the Griggs maximum. The Griggs apparatus therefore probes only the shallowest portion of the mantle — over 90% of the mantle was inaccessible before the D-DIA.',
wfb:'1 GPa ≈ 33 km, so 4 GPa ≈ 120 km. Olivine α-phase is stable. The 410 requires ~14 GPa. The Griggs cannot reach transition zone conditions.',
cite:'Wang et al. (2003). Rev. Sci. Instrum. 74, 3002.',
tags:['Griggs','depth','α-olivine','120 km'],
depth:'Griggs: 0–4 GPa = 0–120 km; olivine α-phase throughout'},

{tier:4,id:'depth-410',cat:'Phase Transitions & Depth',
q:'The 410 km discontinuity results from what transition, and what is its Clapeyron slope sign?',
choices:['Pyroxene → garnet, positive Clapeyron slope','Olivine α (orthorhombic) → wadsleyite β (monoclinic) at ~14 GPa, positive Clapeyron slope — cold material encounters this transition shallower','Wadsleyite → ringwoodite at ~17 GPa, negative slope','Ringwoodite → bridgmanite at ~23 GPa, negative slope'],
ans:1,
cfb:'At ~14 GPa (~410 km), α-Mg₂SiO₄ (olivine, orthorhombic) transforms to β-Mg₂SiO₄ (wadsleyite, monoclinic) with ~8% density increase. The positive Clapeyron slope (dP/dT > 0) means hot upwellings encounter this transition at shallower depth — the exothermic reaction releases heat and the phase change adds buoyancy, aiding plume ascent. Wadsleyite can store significant water (~3 wt%), making it rheologically very different from olivine.',
wfb:'410 = olivine→wadsleyite at ~14 GPa, positive Clapeyron slope. 660 = ringwoodite→bridgmanite at ~23 GPa, negative slope. These have opposite implications for slab dynamics.',
cite:'Stixrude & Lithgow-Bertelloni (2011). GJI 184, 1180–1213.',
tags:['410 km','wadsleyite','Clapeyron slope','phase transition'],
depth:'14 GPa = 410 km; olivine → wadsleyite; positive Clapeyron'},

{tier:4,id:'depth-660',cat:'Phase Transitions & Depth',
q:'The 660 km discontinuity has a negative Clapeyron slope. What does this mean for a cold subducting slab?',
choices:['Cold material encounters the transition at shallower depth — aids penetration','Cold material encounters the transition at greater pressure (deeper) — the phase boundary deflects downward under the slab, creating a density excess that resists penetration into the lower mantle','The slope sign is irrelevant to slab dynamics — only compositional contrasts matter','The negative slope means the transition releases heat, driving convection upward'],
ans:1,
cfb:'A negative Clapeyron slope (dP/dT < 0) means the phase boundary is at higher pressure (deeper) where temperature is lower. A cold slab depresses the 660 boundary downward by 60–100 km in some cases. The region where denser ringwoodite persists below the equilibrium depth has negative buoyancy — resisting slab penetration. This is the physical basis for "slab stagnation" in the transition zone observed seismically.',
wfb:'Negative slope = deeper transition under cold material. Cold slab → boundary depresses → buoyancy force resisting penetration. This is the mechanism behind transition zone slab stagnation.',
cite:'Ito & Takahashi (1989). J. Geophys. Res. 94, 10637.',
tags:['660 km','negative Clapeyron','slab stagnation','bridgmanite'],
depth:'23 GPa = 660 km; ringwoodite → bridgmanite + ferropericlase'},

{tier:4,id:'depth-ddia',cat:'Apparatus & Depth',
q:'The D-DIA reaches 15 GPa. What depth and mineral assemblage is this, and why was this transformative?',
choices:['~200 km — deep upper mantle, olivine stable throughout','~450 km — mid-transition zone, wadsleyite dominates in a pyrolite bulk composition','~660 km — the base of the transition zone, ringwoodite→bridgmanite transition','~1000 km — lower mantle, bridgmanite dominant'],
ans:1,
cfb:'15 GPa ÷ 0.033 GPa/km ≈ 450 km. This is the middle of the transition zone (410–660 km), where wadsleyite dominates in a pyrolite bulk composition (Stixrude & Lithgow-Bertelloni 2011, Fig. 17). Wang et al. (2003) explicitly noted this pushed accessible rheology through the 410 km discontinuity. Before the D-DIA, all quantitative deformation experiments were limited to Griggs conditions (~120 km).',
wfb:'15 GPa ≈ 450 km = mid-transition zone. Wadsleyite dominant. The D-DIA extended accessible rheology by ~330 km depth compared to the Griggs apparatus.',
cite:'Wang et al. (2003). Rev. Sci. Instrum. 74, 3002.\nStixrude & Lithgow-Bertelloni (2011). GJI 184.',
tags:['D-DIA','450 km','wadsleyite','transition zone'],
depth:'D-DIA: 0–15 GPa = 0–450 km; mid-transition zone accessible'},

{tier:4,id:'depth-rda',cat:'Apparatus & Depth',
q:'At 15 GPa the RDA reaches transition zone conditions with torsion geometry. What specifically can RDA do that D-DIA cannot at the same pressure?',
choices:['RDA can achieve higher temperatures than D-DIA','RDA imposes unlimited shear strain (torsion geometry) at 15 GPa, enabling CPO saturation, recrystallization steady state, and phase mixing — all requiring γ >> 1 which D-DIA axial compression cannot reach','RDA provides more accurate stress measurement via synchrotron XRD','RDA uses larger sample volumes for better microstructural characterization'],
ans:1,
cfb:'D-DIA is an axial compression apparatus — limited to ε ≈ 0.5 before geometric complications. The RDA\'s torsion geometry enables unlimited shear strain at 15 GPa. This is critical for studying: CPO development at transition zone conditions, whether dynamic recrystallization reaches steady state, and phase mixing behavior in wadsleyite-bearing assemblages — all of which are geologically relevant processes at 410–660 km depth.',
wfb:'The unique advantage of RDA over D-DIA is torsion geometry giving unlimited γ at the same pressure. RDA samples are actually smaller than D-DIA samples, not larger.',
cite:'Yamazaki & Karato (2001). Rev. Sci. Instrum. 72, 4207.',
tags:['RDA','torsion','D-DIA comparison','large strain'],
depth:'RDA: 0–15 GPa = 0–450 km, torsion; D-DIA: 0–15 GPa axial only'},

{tier:4,id:'depth-lower-mantle',cat:'Phase Transitions & Depth',
q:'Why is lower mantle (>660 km) rheology so poorly constrained experimentally compared to the upper mantle?',
choices:['Lower mantle minerals are too soft to study','Lower mantle conditions (>23 GPa) exceed the pressure range of D-DIA and RDA — multi-anvil presses or diamond anvil cells reach these pressures but lack the sample volume and controlled strain rates needed for quantitative rheology','Lower mantle minerals all deform by diffusion creep so no experiments are needed','The lower mantle is isothermal, so temperature effects are negligible'],
ans:1,
cfb:'Wang et al. (2003) noted: "rheological properties of more than 90% of the Earth\'s mantle remain unexplored experimentally." Bridgmanite (>23 GPa) requires multi-anvil presses far beyond D-DIA/RDA. Diamond anvil cells reach >100 GPa but have no controlled deformation capability and sample volumes <1 μm³. This gap is why Ita & Cohen (1998) first-principles calculations are so important — they provide the only systematic treatment of lower mantle rheology.',
wfb:'The limitation is purely pressure: >23 GPa is beyond D-DIA and RDA. Diamond anvil cells exist at these pressures but cannot do controlled rheology experiments.',
cite:'Wang et al. (2003). Rev. Sci. Instrum. 74, 3002.\nIta & Cohen (1998). Geophys. Res. Lett. 25, 1095.',
tags:['lower mantle','bridgmanite','experimental frontier','23 GPa'],
depth:'>660 km = >23 GPa; beyond D-DIA/RDA capability'},

{tier:4,id:'depth-lvt',cat:'Apparatus & Depth',
q:'The LVT at WashU reaches 3 GPa. What depth is this, and what is its unique experimental niche compared to the D-DIA?',
choices:['~50 km — crustal conditions only','~100 km — upper lithospheric mantle; niche is very large sample volume (4.2 mm diameter) enabling large-strain (γ > 100) microstructural studies impossible in D-DIA','~300 km — deep upper mantle; higher pressure than D-DIA','~410 km — accesses the transition zone like D-DIA but with torsion'],
ans:1,
cfb:'3 GPa ÷ 0.033 GPa/km ≈ 90–100 km. This is upper lithospheric mantle (olivine α-phase). The LVT niche: (1) 4.2 mm diameter samples — 100–1000× larger than D-DIA — enabling detailed EBSD microstructural characterization. (2) γ > 100 in torsion — reaching CPO saturation, recrystallization steady state, phase mixing. (3) Up to 1800 K. The D-DIA reaches deeper but with small samples (≤1 mm) and limited strain (ε ≈ 0.5).',
wfb:'LVT = 3 GPa = ~100 km = α-olivine conditions, but with large samples and unlimited strain. D-DIA = 15 GPa = 450 km but small samples and limited strain. They are complementary.',
cite:'Skemer, P. et al. (2025). Rev. Sci. Instrum. 96, 023903.',
tags:['LVT','WashU','100 km','large sample','large strain'],
depth:'LVT: 0–3 GPa = 0–100 km; large specimen, γ > 100'},

{tier:0,id:'diff-newtonian',cat:'Diffusion Creep',
q:'Why is diffusion creep Newtonian (stress exponent n=1), while dislocation creep is not?',
choices:[
 'Diffusion creep involves no dislocations, so stress cannot concentrate',
 'The vacancy flux driving diffusion creep is linearly proportional to the stress-induced gradient in vacancy concentration, so ε̇ ∝ σ',
 'Diffusion creep only operates at low stress where all laws are linear',
 'Grain boundaries slide at a rate fixed by temperature alone'],
ans:1,
cfb:'A non-hydrostatic stress raises the vacancy concentration under grain faces in tension and lowers it under faces in compression. That concentration difference is linear in σ, the diffusive flux is linear in the gradient, so ε̇ ∝ σ¹ — a Newtonian viscosity. Dislocation creep instead multiplies dislocation density (∝σ²) AND their velocity, giving n≈3.',
wfb:'The linearity is not because stresses are simply "low" — it is intrinsic. The driving force is the stress-induced vacancy concentration gradient, which is first-order in σ, so flux and strain rate are first-order in σ too.',
cite:'Herring, C. (1950). J. Appl. Phys. 21, 437–445.\nPoirier (1985). Creep of Crystals, §3.2.',
tags:['Newtonian','n=1','vacancy flux','diffusion creep']},

{tier:0,id:'coble-low-T',cat:'Diffusion Creep',
q:'Of the two diffusion-creep mechanisms, which tends to dominate at LOWER temperature, and why?',
sub:'Both have n=1 but different grain-size and temperature dependence.',
choices:[
 'Nabarro–Herring, because lattice diffusion is faster when cold',
 'Coble, because grain-boundary diffusion has a lower activation energy than lattice diffusion',
 'They cross over only with grain size, never with temperature',
 'Nabarro–Herring, because boundaries freeze shut at low T'],
ans:1,
cfb:'Grain-boundary diffusion (Coble) carries a lower activation energy Q than volume/lattice diffusion (Nabarro–Herring). Since rate ∝ exp(−Q/RT), the lower-Q path falls off more slowly as T drops, so Coble creep wins at lower temperature (and finer grain size). N-H takes over as T rises.',
wfb:'Lattice diffusion is not "faster when cold" — all diffusion slows on cooling. The point is relative: Coble’s lower Q means it decays more slowly with falling T, so it dominates the cold/fine-grained corner of the deformation map.',
cite:'Coble, R.L. (1963). J. Appl. Phys. 34, 1679–1682.\nFrost, H.J. & Ashby, M.F. (1982). Deformation Mechanism Maps. Pergamon.',
tags:['Coble','activation energy','low-T','deformation map']},

{tier:1,id:'water-weakening',cat:'Olivine Rheology',
q:'Adding trace water (hydrogen) dramatically weakens olivine. How is this captured in the flow law?',
choices:[
 'A lower stress exponent n that makes the rock Newtonian',
 'A multiplicative water-fugacity term, ε̇ ∝ f(H₂O)^r, with r≈1, that raises strain rate at fixed stress',
 'A larger grain size that promotes diffusion creep',
 'Removal of the activation-energy term, so creep becomes athermal'],
ans:1,
cfb:'Dissolved hydrogen (as point defects) speeds the rate-limiting kinetics of both diffusion and dislocation creep. The wet flow law adds a water-fugacity (or C_OH) factor, ε̇ ∝ f(H₂O)^r with r of order 1, so even tens of ppm H/Si can drop the viscosity by an order of magnitude. The stress exponent for wet dislocation creep stays n≈3–3.5.',
wfb:'Water does not make olivine Newtonian, nor does it remove the temperature dependence. It enters as a multiplicative fugacity term (exponent r≈1) that enhances the kinetics; n stays ≈3–3.5 for wet dislocation creep.',
cite:'Mei, S. & Kohlstedt, D.L. (2000). J. Geophys. Res. 105, 21471–21481.\nHirth, G. & Kohlstedt, D.L. (2003). AGU Monogr. 138, 83–105.',
tags:['hydrolytic weakening','water fugacity','wet olivine']},

{tier:1,id:'climb-controlled',cat:'Dislocation Creep',
q:'In Weertman climb-controlled creep, why is dislocation CLIMB the rate-limiting step rather than glide?',
choices:[
 'Glide requires breaking covalent bonds, which is slower than climb',
 'Glide is fast but blocked at obstacles; escaping them requires climb, which needs vacancy diffusion and is therefore the slow, thermally activated step',
 'Climb produces all the strain; glide produces none',
 'Climb is athermal while glide needs high temperature'],
ans:1,
cfb:'Most of the strain is produced by glide, but gliding dislocations pile up against obstacles (other dislocations, junctions). To get past, an edge dislocation must climb out of its slip plane — and climb requires absorbing/emitting vacancies, i.e. diffusion. Because diffusion is the slow, thermally activated process, climb sets the creep rate. This is why high-T power-law creep shares the activation energy of self-diffusion.',
wfb:'Climb itself produces little strain — glide does. Climb is rate-limiting because it is the diffusion-controlled (slow, thermally activated) step that lets piled-up glide dislocations bypass obstacles.',
cite:'Weertman, J. (1955). J. Appl. Phys. 26, 1213–1217.\nPoirier (1985). Creep of Crystals, §4.3.',
tags:['climb-controlled','recovery','self-diffusion','glide']},

{tier:1,id:'rho-sigma-squared',cat:'Dislocation Physics',
q:'At steady state in dislocation creep, how does the dislocation density ρ scale with applied stress σ?',
choices:['ρ ∝ σ','ρ ∝ σ²','ρ ∝ σ⁻¹','ρ is set by temperature, not stress'],
ans:1,
cfb:'The mean spacing of dislocations sets an internal stress that balances the applied stress: σ ≈ αμb√ρ. Inverting gives ρ ∝ σ². This "ρ ∝ σ²" relation underlies dislocation-density paleopiezometry and feeds the Weertman derivation that yields n≈3 (ρ∝σ² times a glide velocity ∝σ).',
wfb:'It is ρ ∝ σ², not linear. The relation comes from σ ≈ αμb√ρ (Taylor relation): the applied stress is balanced by the internal stress of the dislocation network, whose spacing scales as ρ^(−1/2).',
cite:'Poirier (1985). Creep of Crystals, §4.3.2, pp. 108–112.',
tags:['Taylor relation','dislocation density','paleopiezometry']},

{tier:2,id:'recryst-piezometer',cat:'Microstructure',
q:'Recrystallized grain size is used as a paleopiezometer. What is the key relation, and its most useful property?',
choices:[
 'd ∝ σ and it is strongly temperature dependent',
 'd ∝ σ⁻ᵖ (p≈0.6–1.3) and, to first order, it is INSENSITIVE to temperature — so it records stress',
 'd ∝ σ² and depends only on strain rate',
 'd ∝ exp(σ) and requires the strain history to invert'],
ans:1,
cfb:'Dynamically recrystallized grain size decreases with increasing stress as d ∝ σ⁻ᵖ (p typically ~0.6–1.3 depending on mineral/calibration). Its great utility is that, to first order, it depends on stress but only weakly on temperature, strain rate, or total strain — so a measured grain size in a mylonite back-calculates the deviatoric stress during deformation.',
wfb:'The grain size DECREASES with stress (negative exponent), and its value lies in being largely temperature-INsensitive. A strong T-dependence would defeat its use as a stress gauge.',
cite:'Twiss, R.J. (1977). Pure Appl. Geophys. 115, 227–244.\nVan der Wal, D. et al. (1993). Geophys. Res. Lett. 20, 1479–1482.\nStipp, M. & Tullis, J. (2003). Geophys. Res. Lett. 30, 2088.',
tags:['paleopiezometry','recrystallized grain size','mylonite']},

{tier:2,id:'subgrain-vs-recryst',cat:'Microstructure',
q:'A deformed olivine shows both subgrains and smaller fully-recrystallized grains. What do their sizes each tell you?',
choices:[
 'Both give temperature; neither gives stress',
 'Both are independent stress gauges (subgrain size and recrystallized grain size each scale as σ⁻¹-ish), and agreement between them strengthens the paleostress estimate',
 'Subgrain size gives strain rate; grain size gives total strain',
 'Only the recrystallized grains carry any rheological information'],
ans:1,
cfb:'Subgrain (low-angle wall) size and dynamically recrystallized (high-angle) grain size are BOTH piezometers, each decreasing roughly as σ⁻¹. They derive from related physics (the dislocation-spacing/internal-stress balance), so consistent stresses from the two methods is a standard internal check on a paleopiezometry estimate.',
wfb:'Both microstructures are stress gauges, not strain or strain-rate gauges. Their main use together is cross-validation: independent σ estimates that should agree.',
cite:'Poirier (1985). Creep of Crystals, §6.1, pp. 172–176.\nTwiss, R.J. (1977). Pure Appl. Geophys. 115, 227–244.',
tags:['subgrain piezometry','recrystallized grain size','cross-check']},

{tier:2,id:'second-phase-weakening',cat:'Olivine Rheology',
q:'In olivine + ferropericlase aggregates, how does a weak second phase affect bulk strength as its fraction rises?',
choices:[
 'It always strengthens the aggregate by pinning grain boundaries',
 'Once the weak phase interconnects, strain localizes into it and bulk strength drops sharply toward the weak-phase rheology',
 'Strength is the simple volume average of the two phases at all fractions',
 'The second phase has no effect until it exceeds 50%'],
ans:1,
cfb:'Below the interconnection threshold the strong phase (olivine) carries the load and strength tracks it. Once the weak phase (ferropericlase) forms a connected network, strain partitions into it and the aggregate weakens markedly — well below a simple volume average. This load-partitioning/interconnected-weak-layer behavior controls strength in two-phase mantle rocks.',
wfb:'A weak interconnected phase does not strengthen the rock, nor is the response a simple volume average. The key is connectivity: when the weak phase percolates, it short-circuits the strong framework.',
cite:'Wiesman, H. S. et al. (2023). J. Geophys. Res. Solid Earth 128, e2022JB025723.\nHandy, M.R. (1994). J. Struct. Geol. 16, 287–301.',
tags:['two-phase','interconnected weak layer','ferropericlase','load partitioning']},

{tier:3,id:'goetze-criterion',cat:'Attribution',
q:'The "Goetze criterion" marks the brittle-to-plastic transition in strength envelopes. What does it state?',
choices:[
 'Friction equals cohesion at the transition',
 'The transition occurs where the differential stress (σ₁−σ₃) equals the confining/normal pressure',
 'The yield stress equals Young’s modulus',
 'Plasticity begins when temperature exceeds half the melting point'],
ans:1,
cfb:'Goetze’s empirical criterion places the brittle–ductile boundary where the differential stress (σ₁−σ₃) ≈ the confining pressure P. Below it, frictional (Byerlee) failure governs; above the relevant depth, temperature-activated plasticity takes over. It is the standard cap used to close lithospheric strength envelopes.',
wfb:'It is a stress condition, σ₁−σ₃ ≈ P, not a statement about friction vs cohesion, elastic moduli, or a fixed homologous temperature.',
cite:'Kohlstedt, D.L., Evans, B. & Mackwell, S.J. (1995). J. Geophys. Res. 100, 17587–17602.\nGoetze, C. & Evans, B. (1979). Geophys. J. R. Astron. Soc. 59, 463–478.',
tags:['Goetze criterion','strength envelope','brittle-ductile transition']},

{tier:3,id:'schmid-law',cat:'Attribution',
q:'Schmid’s law governs the onset of slip on a crystal plane. What does it say?',
choices:[
 'Slip starts when the normal stress on the plane reaches a critical value',
 'Slip starts when the RESOLVED shear stress on the slip system (τ = σ·cosφ·cosλ) reaches a critical value, independent of the normal stress',
 'Slip rate equals the strain rate divided by Schmid factor',
 'The hardest slip system always activates first'],
ans:1,
cfb:'Schmid’s law: a slip system activates when the resolved shear stress τ = σ cosφ cosλ (φ = angle between load and slip-plane normal, λ = angle to slip direction) reaches the critical resolved shear stress. The product cosφ cosλ is the Schmid factor; the system with the HIGHEST Schmid factor (lowest CRSS demand) activates first. Normal stress across the plane does not, to first order, control slip.',
wfb:'Slip is driven by RESOLVED SHEAR stress, not normal stress, and the EASIEST (highest Schmid factor) system activates first, not the hardest.',
cite:'Schmid, E. & Boas, W. (1950). Plasticity of Crystals. Hughes & Co.\nPoirier (1985). Creep of Crystals, §2.2.',
tags:["Schmid's law",'resolved shear stress','CRSS','slip system']},

{tier:4,id:'cpo-anisotropy',cat:'CPO Fabrics',
q:'Dislocation creep of olivine builds a crystal-preferred orientation (CPO). Why does this matter seismically?',
choices:[
 'It changes the rock density, slowing all waves equally',
 'Aligned olivine [100] axes make the mantle elastically anisotropic, so seismic wave speed and shear-wave splitting depend on propagation direction — a probe of mantle flow',
 'CPO only affects electrical conductivity, not seismic waves',
 'It randomizes orientations, erasing anisotropy'],
ans:1,
cfb:'Dislocation creep rotates olivine crystals toward a common orientation (e.g. A-type fabric aligns fast [100] axes with the shear/flow direction). Because single-crystal olivine is strongly elastically anisotropic, the bulk rock becomes anisotropic: P/S velocities vary with direction and shear waves split. Measured anisotropy (e.g. SKS splitting) therefore maps the geometry of mantle flow. Diffusion creep, which produces no CPO, leaves the mantle seismically isotropic.',
wfb:'CPO does not just change density or conductivity, and dislocation creep SHARPENS (not randomizes) the fabric. The alignment of elastically anisotropic olivine is what produces directional seismic velocities and shear-wave splitting.',
cite:'Karato, S. et al. (2008). Annu. Rev. Earth Planet. Sci. 36, 59–95.\nMainprice, D. (2007). Treatise on Geophysics 2, 437–491.',
tags:['CPO','seismic anisotropy','shear-wave splitting','mantle flow']}
];

const TIER_LABELS=['Foundational','Mechanistic','Advanced','Attribution','Depth & Apparatus'];
const FILTERS=['All',...TIER_LABELS];

let state={filter:'All',queue:[],qIdx:0,answered:false,selected:null,score:0,total:0,history:[],showResults:false};

function buildQueue(){
  let pool=state.filter==='All'?[...Q]:Q.filter(q=>TIER_LABELS[q.tier]===state.filter);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  state.queue=pool;state.qIdx=0;state.answered=false;state.selected=null;state.score=0;state.total=0;state.history=[];state.showResults=false;
}

function curQ(){return state.queue[state.qIdx]||null;}

function selectAnswer(idx){
  if(state.answered)return;
  state.selected=idx;state.answered=true;
  const q=curQ();const correct=(idx===q.ans);
  state.history.push(correct?'hit':'miss');
  if(correct)state.score++;state.total++;render();
}

function next(){
  state.qIdx++;state.answered=false;state.selected=null;
  if(state.qIdx>=state.queue.length)state.showResults=true;render();
}

function restart(){buildQueue();render();}
function setFilter(f){state.filter=f;buildQueue();render();}
function grade(p){return p>=90?'Excellent':p>=75?'Good':p>=60?'Getting there':'Keep drilling';}

function renderResults(){
  const pct=Math.round(state.score/state.total*100);
  const circ=2*Math.PI*38,dash=circ*(pct/100);
  document.getElementById('app').innerHTML=`<div class="results">
    <div class="results-ring"><svg viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="38" fill="none" stroke="var(--bg3)" stroke-width="8"/>
      <circle cx="55" cy="55" r="38" fill="none" stroke="var(--correct-border)" stroke-width="8"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 55 55)"/>
    </svg><div class="results-pct">${pct}%</div></div>
    <div class="results-grade">${grade(pct)}</div>
    <div class="results-label">${state.score}/${state.total} · ${state.filter}</div>
    <div class="results-stats">
      <div class="rstat"><div class="rstat-val">${state.total}</div><div class="rstat-lbl">questions</div></div>
      <div class="rstat"><div class="rstat-val">${state.score}</div><div class="rstat-lbl">correct</div></div>
      <div class="rstat"><div class="rstat-val">${state.total-state.score}</div><div class="rstat-lbl">missed</div></div>
    </div>
    <div class="streak-bar">${state.history.map(h=>`<div class="streak-dot ${h}"></div>`).join('')}</div>
    <div class="results-btns">
      <button class="btn primary" onclick="restart()">Try again (reshuffled)</button>
      <button class="btn info" onclick="window.open('https://claude.ai/new?q='+encodeURIComponent('I finished the rheology quiz (${state.filter} tier, ${pct}%). Give me a targeted 3-min review of concepts I need to reinforce.'),'_blank')">↗ Get a focused review</button>
    </div></div>`;
}

function render(){
  if(state.showResults){renderResults();return;}
  const q=curQ();if(!q){renderResults();return;}
  const app=document.getElementById('app');
  const pct=state.queue.length>0?Math.round(state.qIdx/state.queue.length*100):0;
  const choicesHTML=q.choices.map((c,i)=>{
    let cls='choice';
    if(state.answered){if(i===q.ans)cls+=' correct';else if(i===state.selected&&i!==q.ans)cls+=' wrong';else cls+=' dimmed';}
    return`<button class="${cls}" onclick="selectAnswer(${i})"${state.answered?' disabled':''}>${c}</button>`;
  }).join('');
  const fbHTML=state.answered?`<div class="feedback ${state.selected===q.ans?'correct':'wrong'}">
    <div class="fb-head ${state.selected===q.ans?'c':'w'}">${state.selected===q.ans?'✓ Correct':'✗ Not quite'}</div>
    <div class="fb-txt">${state.selected===q.ans?q.cfb:q.wfb}</div>
    <div class="citation">${q.cite}</div></div>`:'';
  const depthHTML=q.depth?`<div class="depth-tag">🌍 ${q.depth}</div>`:'';
  app.innerHTML=`
    <div class="top-row"><span class="app-label">Rheology quiz</span><span class="score-pill">${state.score}/${state.total}</span></div>
    <div class="filter-scroll">${FILTERS.map(f=>`<button class="filter-btn${state.filter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('')}</div>
    <div class="progress-row"><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-label">${state.qIdx+1}/${state.queue.length}</span></div>
    <div class="qcard"><span class="tier-badge tier-${q.tier}">${TIER_LABELS[q.tier]} · ${q.cat}</span>
      <div class="qnum">Q${state.qIdx+1} of ${state.queue.length}</div>
      <div class="qtext">${q.q}</div>${q.sub?`<div class="qsub">${q.sub}</div>`:''}${depthHTML}</div>
    <div class="choices">${choicesHTML}</div>${fbHTML}
    ${state.answered?`<div class="tag-row">${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="action-row" style="margin-top:9px;">
      ${state.qIdx+1<state.queue.length?`<button class="btn primary" onclick="next()">Next →</button>`:`<button class="btn primary" onclick="next()">Results</button>`}
      <button class="btn info" onclick="window.open('https://claude.ai/new?q='+encodeURIComponent('Go deeper on: ${q.tags[0]} — ${q.q.replace(/'/g,"'")}'),'_blank')">↗ Go deeper</button>
    </div>`:''}`;
}

buildQueue();render();
</script>
</body>
</html>
